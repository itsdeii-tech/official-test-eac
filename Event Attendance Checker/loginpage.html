<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Event Attendance Checker</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #f8f9fa 0%, #e6f0e6 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 8px 30px rgba(0,100,0,0.15);
      overflow: hidden;
      width: 100%;
      max-width: 420px;
    }

    .header {
      background: #006400;
      color: white;
      padding: 30px 20px;
      text-align: center;
    }
    .header img {
      width: 100px;
      height: 100px;
      object-fit: cover;
      border-radius: 50%;
      border: 3px solid white;
      margin-bottom: 15px;
    }
    .header h1 { font-size: 22px; margin-bottom: 6px; }
    .header p  { font-size: 13px; opacity: 0.85; }

    .form-body { padding: 30px 25px; }

    .form-group { margin-bottom: 18px; }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
      color: #006400;
      font-size: 14px;
    }

    .input-wrapper { position: relative; }
    .input-wrapper i.input-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #888;
      font-size: 15px;
    }
    .input-wrapper input {
      width: 100%;
      padding: 12px 14px 12px 38px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 15px;
      transition: border 0.2s;
    }
    .input-wrapper input:focus {
      outline: none;
      border-color: #228B22;
      box-shadow: 0 0 0 3px rgba(34,139,34,0.1);
    }
    .toggle-password {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #888;
      font-size: 15px;
    }
    .toggle-password:hover { color: #006400; }

    /* SIMPLE ROLE SELECTION */
    .role-label {
      font-weight: bold;
      color: #006400;
      font-size: 14px;
      margin-bottom: 8px;
      display: block;
    }
    .role-selection {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }
    .role-option { flex: 1; text-align: center; }
    .role-option input[type="radio"] { display: none; }
    .role-option label {
      display: block;
      padding: 10px;
      background: #f0f7f0;
      border: 2px solid #ccc;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 14px;
      color: #333;
    }
    .role-option input[type="radio"]:checked + label {
      background: #228B22;
      color: white;
      border-color: #006400;
      font-weight: bold;
    }

    .error-message {
      display: none;
      background: #fff5f5;
      color: #dc2626;
      font-size: 13px;
      padding: 10px 14px;
      border-radius: 6px;
      border-left: 4px solid #dc2626;
      margin-bottom: 15px;
    }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: #006400;
      color: white;
      border: none;
      border-radius: 30px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-login:hover    { opacity: 0.9; }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }

    .links {
      text-align: center;
      margin-top: 18px;
      font-size: 13px;
      color: #888;
    }
    .links a {
      color: #006400;
      text-decoration: none;
      font-weight: bold;
    }
    .links a:hover { text-decoration: underline; }

    .footer {
      background: #006400;
      color: white;
      text-align: center;
      padding: 12px;
      font-size: 12px;
    }
  </style>
</head>
<body>

  <div class="login-container">

    <div class="header">
      <img src="images/asiatech_logo.jpg" alt="ASIATECH Logo">
      <h1>Event Attendance Checker</h1>
      <p>Cloud-based QR Attendance System for CEITE</p>
    </div>

    <div class="form-body">
      <form id="loginForm" onsubmit="handleLogin(event)">

        <!-- Role Selection — simple lang -->
        <span class="role-label">Login as:</span>
        <div class="role-selection">
          <div class="role-option">
            <input type="radio" id="role-faculty" name="role" value="faculty" checked>
            <label for="role-faculty">Faculty</label>
          </div>
          <div class="role-option">
            <input type="radio" id="role-student" name="role" value="student">
            <label for="role-student">Student</label>
          </div>
        </div>

        <!-- Email -->
        <div class="form-group">
          <label for="email">Email</label>
          <div class="input-wrapper">
            <i class="fas fa-envelope input-icon"></i>
            <input type="email" id="email"
              placeholder="1-230420@asiatech.edu.ph"
              required autocomplete="email">
          </div>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <i class="fas fa-lock input-icon"></i>
            <input type="password" id="password"
              placeholder="••••••••"
              required autocomplete="current-password">
            <i class="fas fa-eye toggle-password" id="togglePassword"></i>
          </div>
        </div>

        <!-- Error -->
        <div class="error-message" id="errorMsg">
          <i class="fas fa-exclamation-circle"></i>
          <span id="errorText"></span>
        </div>

        <button type="submit" class="btn-login" id="btn-login">
          <i class="fas fa-sign-in-alt"></i> Login
        </button>

      </form>

      <div class="links">
        Don't have an account?
        <a href="student-register.html">Create Account</a>
      </div>
    </div>

    <div class="footer">
      YOUR KEY TO GLOBAL SUCCESS! &nbsp;•&nbsp; &copy; 2026 ASIATECH
    </div>

  </div>

  <script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyMPFF6fA9o6FEbHr1eaRtnLIiE7kvmvOIL9nYx6IIKK9zi_jAc2blqnu3hrYi72u4qwA/exec';

    // Show/hide password
    document.getElementById('togglePassword').addEventListener('click', function() {
      const pwd  = document.getElementById('password');
      const icon = document.getElementById('togglePassword');
      if (pwd.type === 'password') {
        pwd.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
      } else {
        pwd.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
      }
    });

    async function handleLogin(event) {
      event.preventDefault();

      const role     = document.querySelector('input[name="role"]:checked')?.value;
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const btn      = document.getElementById('btn-login');

      hideError();

      // Validate institutional email
      if (!email.endsWith('@asiatech.edu.ph')) {
        showError("Please use your institutional email (@asiatech.edu.ph) only!");
        return;
      }

      if (!password) {
        showError("Please enter your password.");
        return;
      }

      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';
      btn.disabled  = true;

      try {
        const url = `${scriptURL}?action=login&email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`;
        const response = await fetch(url, { method: "GET", redirect: "follow" });
        const result   = await response.json();

        if (result.success) {
          if (result.role !== role) {
            showError(`You are registered as ${result.role}. Please select the correct role.`);
            return;
          }

          sessionStorage.setItem('user', JSON.stringify(result));

          if (result.role === 'faculty') {
            window.location.href = 'faculty-dashboard.html';
          } else {
            window.location.href = 'student-portal.html';
          }

        } else {
          showError(result.message || "Invalid email or password!");
        }

      } catch (err) {
        showError("Connection failed. Please try again.");
      } finally {
        btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
        btn.disabled  = false;
      }
    }

    function showError(msg) {
      const err  = document.getElementById('errorMsg');
      const text = document.getElementById('errorText');
      text.textContent  = msg;
      err.style.display = 'block';
    }

    function hideError() {
      document.getElementById('errorMsg').style.display = 'none';
    }
  </script>

</body>
</html>

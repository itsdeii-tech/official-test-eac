<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Page - CEITE</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #f8f9fa 0%, #e6f0e6 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 8px 30px rgba(0,100,0,0.15);
      overflow: hidden;
      width: 100%;
      max-width: 420px;
    }

    .header {
      background: #006400;
      color: white;
      padding: 30px 20px;
      text-align: center;
    }
    .header img {
      width: 100px;
      height: 100px;
      object-fit: cover;
      border-radius: 50%;
      border: 3px solid white;
      margin-bottom: 15px;
    }
    .header h1 { font-size: 22px; margin-bottom: 6px; }
    .header p  { font-size: 13px; opacity: 0.85; }

    .form-body { padding: 30px 25px; }
    .form-group { margin-bottom: 18px; }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
      color: #006400;
      font-size: 14px;
    }

    .input-wrapper { position: relative; }
    .input-wrapper i.input-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #888;
      font-size: 15px;
    }
    .input-wrapper input {
      width: 100%;
      padding: 12px 14px 12px 38px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 15px;
      transition: border 0.2s;
    }
    .input-wrapper input:focus {
      outline: none;
      border-color: #228B22;
      box-shadow: 0 0 0 3px rgba(34,139,34,0.1);
    }
    .toggle-password {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #888;
      font-size: 15px;
    }
    .toggle-password:hover { color: #006400; }

    /* ROLE SELECTION */
    .role-label { font-weight: bold; color: #006400; font-size: 14px; margin-bottom: 8px; display: block; }
    .role-selection { display: flex; gap: 12px; margin-bottom: 20px; }
    .role-option { flex: 1; text-align: center; }
    .role-option input[type="radio"] { display: none; }
    .role-option label {
      display: block;
      padding: 10px;
      background: #f0f7f0;
      border: 2px solid #ccc;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 14px;
      color: #333;
    }
    .role-option input[type="radio"]:checked + label {
      background: #228B22;
      color: white;
      border-color: #006400;
      font-weight: bold;
    }

    /* MESSAGES */
    .error-message {
      display: none;
      background: #fff5f5;
      color: #dc2626;
      font-size: 13px;
      padding: 10px 14px;
      border-radius: 6px;
      border-left: 4px solid #dc2626;
      margin-bottom: 15px;
    }
    .success-message {
      display: none;
      background: #f0fff4;
      color: #166534;
      font-size: 13px;
      padding: 10px 14px;
      border-radius: 6px;
      border-left: 4px solid #228B22;
      margin-bottom: 15px;
    }

    /* BUTTONS */
    .btn-login {
      width: 100%;
      padding: 14px;
      background: #006400;
      color: white;
      border: none;
      border-radius: 30px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-login:hover    { opacity: 0.9; }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }

    .btn-secondary {
      width: 100%;
      padding: 12px;
      background: #228B22;
      color: white;
      border: none;
      border-radius: 30px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-top: 10px;
    }
    .btn-secondary:hover    { opacity: 0.9; }
    .btn-secondary:disabled { opacity: 0.6; cursor: not-allowed; }

    .btn-back {
      width: 100%;
      padding: 10px;
      background: none;
      color: #006400;
      border: 1px solid #006400;
      border-radius: 30px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
    }
    .btn-back:hover { background: #f0f7f0; }

    /* LINKS */
    .links { text-align: center; margin-top: 18px; font-size: 13px; color: #888; }
    .links a { color: #006400; text-decoration: none; font-weight: bold; }
    .links a:hover { text-decoration: underline; }

    .forgot-link {
      text-align: right;
      margin-top: -10px;
      margin-bottom: 15px;
      font-size: 13px;
    }
    .forgot-link a { color: #006400; text-decoration: none; font-weight: bold; }
    .forgot-link a:hover { text-decoration: underline; }

    /* STEPS — hidden by default */
    .step { display: none; }
    .step.active { display: block; }

    /* OTP INPUT */
    .otp-info {
      background: #f0f7f0;
      border-left: 4px solid #228B22;
      padding: 10px 14px;
      border-radius: 0 6px 6px 0;
      font-size: 13px;
      color: #555;
      margin-bottom: 15px;
    }

    .footer {
      background: #006400;
      color: white;
      text-align: center;
      padding: 12px;
      font-size: 12px;
    }
  </style>
</head>
<body>

  <div class="login-container">

    <div class="header">
      <img src="images/asiatech_logo.jpg" alt="ASIATECH Logo">
      <h1>Event Attendance Checker</h1>
      <p>Cloud-based QR Attendance System for CEITE</p>
    </div>

    <div class="form-body">

      <!-- ═══ STEP 1 — LOGIN FORM ═══ -->
      <div class="step active" id="step-login">
        <form id="loginForm" onsubmit="handleLogin(event)">

          <span class="role-label">Login as:</span>
          <div class="role-selection">
            <div class="role-option">
              <input type="radio" id="role-faculty" name="role" value="faculty" checked>
              <label for="role-faculty">Faculty</label>
            </div>
            <div class="role-option">
              <input type="radio" id="role-student" name="role" value="student">
              <label for="role-student">Student</label>
            </div>
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <div class="input-wrapper">
              <i class="fas fa-envelope input-icon"></i>
              <input type="email" id="email"
                placeholder="1-230420@asiatech.edu.ph"
                required autocomplete="email">
            </div>
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <div class="input-wrapper">
              <i class="fas fa-lock input-icon"></i>
              <input type="password" id="password"
                placeholder="••••••••"
                required autocomplete="current-password">
              <i class="fas fa-eye toggle-password" id="togglePassword"></i>
            </div>
          </div>

          <!-- Forgot Password link -->
          <div class="forgot-link">
            <a href="#" onclick="showStep('step-forgot-email')">Forgot Password?</a>
          </div>

          <div class="error-message" id="errorMsg">
            <i class="fas fa-exclamation-circle"></i>
            <span id="errorText"></span>
          </div>

          <button type="submit" class="btn-login" id="btn-login">
            <i class="fas fa-sign-in-alt"></i> Login
          </button>

        </form>

        <div class="links">
          Don't have an account?
          <a href="student-register.html">Create Account</a>
        </div>
      </div>

      <!-- ═══ STEP 2 — ENTER EMAIL ═══ -->
      <div class="step" id="step-forgot-email">
        <div class="form-group">
          <label>Enter your institutional email</label>
          <div class="input-wrapper">
            <i class="fas fa-envelope input-icon"></i>
            <input type="email" id="forgot-email"
              placeholder="1-230420@asiatech.edu.ph">
          </div>
        </div>

        <div class="error-message" id="forgotEmailError">
          <i class="fas fa-exclamation-circle"></i>
          <span id="forgotEmailErrorText"></span>
        </div>

        <div class="success-message" id="forgotEmailSuccess">
          <i class="fas fa-circle-check"></i>
          <span id="forgotEmailSuccessText"></span>
        </div>

        <button class="btn-login" id="btn-send-otp" onclick="sendOTP()">
          <i class="fas fa-paper-plane"></i> Send OTP
        </button>
        <button class="btn-back" onclick="showStep('step-login')">
          ← Back to Login
        </button>
      </div>

      <!-- ═══ STEP 3 — ENTER OTP + NEW PASSWORD ═══ -->
      <div class="step" id="step-verify-otp">

        <div class="otp-info">
          <i class="fas fa-circle-info"></i>
          OTP sent to your email. Valid for <strong>5 minutes</strong>.
        </div>

        <div class="form-group">
          <label>Enter OTP</label>
          <div class="input-wrapper">
            <i class="fas fa-key input-icon"></i>
            <input type="text" id="otp-input"
              placeholder="Enter 6-digit OTP"
              maxlength="6">
          </div>
        </div>

        <div class="form-group">
          <label>New Password</label>
          <div class="input-wrapper">
            <i class="fas fa-lock input-icon"></i>
            <input type="password" id="new-password"
              placeholder="Enter new password">
            <i class="fas fa-eye toggle-password" id="toggleNewPwd"></i>
          </div>
        </div>

        <div class="form-group">
          <label>Confirm New Password</label>
          <div class="input-wrapper">
            <i class="fas fa-lock input-icon"></i>
            <input type="password" id="confirm-new-password"
              placeholder="Re-enter new password">
            <i class="fas fa-eye toggle-password" id="toggleConfirmPwd"></i>
          </div>
        </div>

        <div class="error-message" id="otpError">
          <i class="fas fa-exclamation-circle"></i>
          <span id="otpErrorText"></span>
        </div>

        <div class="success-message" id="otpSuccess">
          <i class="fas fa-circle-check"></i>
          <span id="otpSuccessText"></span>
        </div>

        <button class="btn-login" id="btn-verify-otp" onclick="verifyOTPandReset()">
          <i class="fas fa-check"></i> Reset Password
        </button>
        <button class="btn-back" onclick="showStep('step-forgot-email')">
          ← Back
        </button>
      </div>

    </div>

    <div class="footer">
      YOUR KEY TO GLOBAL SUCCESS! &nbsp;•&nbsp; &copy; 2026 ASIATECH
    </div>

  </div>

  <script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzYdDr94uC7aByOQG7l2DNXUuIVfUxmn5aHBdl5_ZHvCabQoz0wHNSAtTdnRPVwepRK4g/exec';

    // Show/hide password
    document.getElementById('togglePassword').addEventListener('click', function() {
      const pwd  = document.getElementById('password');
      const icon = document.getElementById('togglePassword');
      if (pwd.type === 'password') { pwd.type = 'text'; icon.classList.replace('fa-eye', 'fa-eye-slash'); }
      else { pwd.type = 'password'; icon.classList.replace('fa-eye-slash', 'fa-eye'); }
    });
    document.getElementById('toggleNewPwd').addEventListener('click', function() {
      const pwd  = document.getElementById('new-password');
      const icon = document.getElementById('toggleNewPwd');
      if (pwd.type === 'password') { pwd.type = 'text'; icon.classList.replace('fa-eye', 'fa-eye-slash'); }
      else { pwd.type = 'password'; icon.classList.replace('fa-eye-slash', 'fa-eye'); }
    });
    document.getElementById('toggleConfirmPwd').addEventListener('click', function() {
      const pwd  = document.getElementById('confirm-new-password');
      const icon = document.getElementById('toggleConfirmPwd');
      if (pwd.type === 'password') { pwd.type = 'text'; icon.classList.replace('fa-eye', 'fa-eye-slash'); }
      else { pwd.type = 'password'; icon.classList.replace('fa-eye-slash', 'fa-eye'); }
    });

    // Step navigation
    function showStep(stepId) {
      document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
      document.getElementById(stepId).classList.add('active');
    }

    // LOGIN
    async function handleLogin(event) {
      event.preventDefault();
      hideError();

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const role     = document.querySelector('input[name="role"]:checked').value;

      if (!email || !password) {
        showError("Please fill in all fields!");
        return;
      }

      const btn = document.getElementById('btn-login');
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';
      btn.disabled  = true;

      try {
        const response = await fetch(scriptURL, {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: `data=${encodeURIComponent(JSON.stringify({
            action: "login", email, password
          }))}`,
          redirect: "follow"
        });

        const result = await response.json();

        if (result.success) {
          if (result.role !== role) {
            showError("Wrong role selected! Please select the correct role.");
            return;
          }
          sessionStorage.setItem('user', JSON.stringify(result));
          window.location.href = result.role === 'faculty'
            ? 'faculty-dashboard.html'
            : 'student-portal.html';
        } else {
          showError(result.message || "Invalid email or password!");
        }

      } catch(err) {
        showError("Connection failed. Please try again.");
      } finally {
        btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
        btn.disabled  = false;
      }
    }

    // SEND OTP
    async function sendOTP() {
      const email = document.getElementById('forgot-email').value.trim();
      const errEl = document.getElementById('forgotEmailError');
      const sucEl = document.getElementById('forgotEmailSuccess');

      errEl.style.display = 'none';
      sucEl.style.display = 'none';

      if (!email) {
        document.getElementById('forgotEmailErrorText').textContent = "Please enter your email!";
        errEl.style.display = 'block';
        return;
      }
      if (!email.endsWith('@asiatech.edu.ph')) {
        document.getElementById('forgotEmailErrorText').textContent = "Please use your institutional email!";
        errEl.style.display = 'block';
        return;
      }

      const btn = document.getElementById('btn-send-otp');
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending OTP...';
      btn.disabled  = true;

      try {
        const response = await fetch(scriptURL, {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: `data=${encodeURIComponent(JSON.stringify({
            action: "sendOTP",
            email:  email
          }))}`,
          redirect: "follow"
        });

        const result = await response.json();

        if (result.success) {
          document.getElementById('forgotEmailSuccessText').textContent = "OTP sent! Check your email.";
          sucEl.style.display = 'block';
          // Go to step 3 after 1.5 secs
          setTimeout(() => showStep('step-verify-otp'), 1500);
        } else {
          document.getElementById('forgotEmailErrorText').textContent = result.message || "Email not found!";
          errEl.style.display = 'block';
        }

      } catch(err) {
        document.getElementById('forgotEmailErrorText').textContent = "Connection failed. Please try again.";
        errEl.style.display = 'block';
      } finally {
        btn.innerHTML = '<i class="fas fa-paper-plane"></i> Send OTP';
        btn.disabled  = false;
      }
    }

    // VERIFY OTP + RESET PASSWORD
    async function verifyOTPandReset() {
      const email       = document.getElementById('forgot-email').value.trim();
      const otp         = document.getElementById('otp-input').value.trim();
      const newPassword = document.getElementById('new-password').value.trim();
      const confirmPwd  = document.getElementById('confirm-new-password').value.trim();
      const errEl       = document.getElementById('otpError');
      const sucEl       = document.getElementById('otpSuccess');

      errEl.style.display = 'none';
      sucEl.style.display = 'none';

      if (!otp || !newPassword || !confirmPwd) {
        document.getElementById('otpErrorText').textContent = "Please fill in all fields!";
        errEl.style.display = 'block';
        return;
      }
      if (newPassword !== confirmPwd) {
        document.getElementById('otpErrorText').textContent = "Passwords do not match!";
        errEl.style.display = 'block';
        return;
      }
      if (newPassword.length < 6) {
        document.getElementById('otpErrorText').textContent = "Password must be at least 6 characters!";
        errEl.style.display = 'block';
        return;
      }

      const btn = document.getElementById('btn-verify-otp');
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Resetting...';
      btn.disabled  = true;

      try {
        const response = await fetch(scriptURL, {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: `data=${encodeURIComponent(JSON.stringify({
            action:      "verifyOTP",
            email:       email,
            otp:         otp,
            newPassword: newPassword
          }))}`,
          redirect: "follow"
        });

        const result = await response.json();

        if (result.success) {
          document.getElementById('otpSuccessText').textContent = "Password reset successfully! Redirecting to login...";
          sucEl.style.display = 'block';
          setTimeout(() => showStep('step-login'), 2000);
        } else {
          document.getElementById('otpErrorText').textContent = result.message || "Invalid or expired OTP!";
          errEl.style.display = 'block';
        }

      } catch(err) {
        document.getElementById('otpErrorText').textContent = "Connection failed. Please try again.";
        errEl.style.display = 'block';
      } finally {
        btn.innerHTML = '<i class="fas fa-check"></i> Reset Password';
        btn.disabled  = false;
      }
    }

    function showError(msg) {
      const err  = document.getElementById('errorMsg');
      const text = document.getElementById('errorText');
      text.textContent  = msg;
      err.style.display = 'block';
    }

    function hideError() {
      document.getElementById('errorMsg').style.display = 'none';
    }
  </script>

</body>
</html>

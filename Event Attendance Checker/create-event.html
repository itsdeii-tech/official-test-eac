<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post New Event - Faculty Attendance System</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: Arial, Helvetica, sans-serif; background-color: #f8f9fa; color: #333; min-height: 100vh; }

    /* SIDEBAR — default collapsed, hover to open */
    .sidebar {
      width: 70px;
      background-color: #006400;
      color: white;
      padding: 20px 10px;
      height: 100vh;
      position: fixed;
      left: 0; top: 0;
      overflow: hidden;
      transition: width 0.3s ease;
      z-index: 1000;
    }
    .sidebar:hover { width: 240px; }
    .sidebar-text { display: none; white-space: nowrap; }
    .sidebar:hover .sidebar-text { display: inline; }
    .sidebar-logo {
      width: 50px;
      margin: 0 auto 20px;
      display: block;
      border-radius: 50%;
      transition: width 0.3s ease;
    }
    .sidebar:hover .sidebar-logo { width: 120px; }
 
    .sidebar:hover .sidebar-title { display: block; }
    .sidebar a {
      display: flex;
      align-items: center;
      color: white;
      text-decoration: none;
      padding: 12px 10px;
      margin-bottom: 8px;
      border-radius: 6px;
      transition: background 0.2s;
    }
    .sidebar a:hover, .sidebar a.active { background-color: #228B22; }
    .sidebar i {
      min-width: 24px;
      font-size: 18px;
      text-align: center;
      margin-right: 0;
      transition: margin 0.3s ease;
    }
    .sidebar:hover i { margin-right: 12px; }

    /* MAIN */
    .main {
      margin-left: 70px;
      padding: 0;
      transition: margin-left 0.3s ease;
    }

    /* TOP BAR — flush */
    .top-bar {
      background-color: #006400;
      color: white;
      padding: 20px;
      text-align: center;
      margin-bottom: 25px;
    }
    .top-bar h1 { font-size: 26px; margin: 0; }
    .top-bar p  { margin: 5px 0 0; font-size: 15px; opacity: 0.9; }

    /* CONTENT */
    .content-wrap { padding: 0 25px 25px; }

    .form-card {
      background: white;
      border: 1px solid #006400;
      border-radius: 8px;
      padding: 30px;
      max-width: 700px;
      margin: 0 auto;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .form-card h2 {
      color: #006400;
      margin-bottom: 25px;
      text-align: center;
      font-size: 22px;
    }

    label {
      display: block;
      margin: 15px 0 5px;
      font-size: 14px;
      font-weight: bold;
      color: #006400;
    }

    .input-wrapper { position: relative; }
    .input-wrapper i.input-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #888;
      font-size: 14px;
    }
    .input-wrapper input,
    .input-wrapper textarea {
      width: 100%;
      padding: 11px 14px 11px 36px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
      transition: border 0.2s;
    }
    .input-wrapper textarea {
      padding-top: 12px;
      resize: vertical;
    }
    .input-wrapper input:focus,
    .input-wrapper textarea:focus {
      outline: none;
      border-color: #006400;
      box-shadow: 0 0 0 3px rgba(0,100,0,0.1);
    }

    .row { display: flex; gap: 20px; flex-wrap: wrap; }
    .row > div { flex: 1; min-width: 200px; }

    .create-btn {
      background: #228B22;
      color: white;
      padding: 14px 40px;
      font-size: 16px;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      display: block;
      margin: 25px auto;
      width: 100%;
    }
    .create-btn:hover    { opacity: 0.9; }
    .create-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .back-link {
      display: block;
      text-align: center;
      margin: 15px 0;
      color: #006400;
      font-weight: bold;
      text-decoration: underline;
      font-size: 14px;
    }
    .note {
      text-align: center;
      color: #888;
      font-size: 13px;
      margin-top: 20px;
      padding-top: 15px;
      border-top: 1px solid #eee;
    }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <nav class="sidebar" id="sidebar">
    <img src="images/asiatech_logo.jpg" alt="ASIATECH Logo" class="sidebar-logo">
    <a href="faculty-dashboard.html"><i class="fas fa-home"></i> <span class="sidebar-text">Dashboard</span></a>
    <a href="create-event.html"><i class="fas fa-plus-circle"></i> <span class="sidebar-text">Post New Event</span></a>
    <a href="my-events.html"><i class="fas fa-calendar-alt"></i> <span class="sidebar-text">My Events</span></a>
    <a href="scan-qr.html"><i class="fas fa-qrcode"></i> <span class="sidebar-text">Scan QR Code</span></a>
    <a href="view-records.html"><i class="fas fa-list-check"></i> <span class="sidebar-text">View/Download Reports</span></a>
    <a href="faculty-profile.html"><i class="fas fa-user-circle"></i> <span class="sidebar-text">Profile</span></a>
    <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> <span class="sidebar-text">Logout</span></a>
  </nav>

  <!-- Main -->
  <main class="main" id="main">

    <div class="top-bar">
      <h1>Post New Event</h1>
      <p>Cloud-based Event Attendance Checker for CEITE</p>
    </div>

    <div class="content-wrap">
      <div class="form-card">
        <h2><i class="fas fa-calendar-plus"></i> Create a New Event</h2>

        <!-- Event Title -->
        <label>Event Title</label>
        <div class="input-wrapper">
          <i class="fas fa-pen input-icon"></i>
          <input type="text" id="eventTitle" placeholder="e.g. Orientation Seminar" required>
        </div>

        <!-- Date + Time -->
        <div class="row">
          <div>
            <label>Date</label>
            <div class="input-wrapper">
              <i class="fas fa-calendar input-icon"></i>
              <input type="date" id="eventDate" required>
            </div>
          </div>
          <div>
            <label>Time</label>
            <div class="input-wrapper">
              <i class="fas fa-clock input-icon"></i>
              <input type="time" id="eventTime" required>
            </div>
          </div>
        </div>

        <!-- Venue -->
        <label>Venue / Location</label>
        <div class="input-wrapper">
          <i class="fas fa-location-dot input-icon"></i>
          <input type="text" id="eventVenue" placeholder="e.g. Main Hall">
        </div>

        <!-- Event Note -->
        <label>Event Note</label>
        <div class="input-wrapper">
          <i class="fas fa-note-sticky input-icon"></i>
          <textarea id="eventNote" rows="4"
            placeholder="e.g. Bring your student ID. Wear proper uniform."></textarea>
        </div>

        <button class="create-btn" onclick="createEventRealTime()">
          <i class="fas fa-plus"></i> Create Event
        </button>

        <div style="text-align: center;">
          <a href="my-events.html" style="color: #006400; font-weight: bold; font-size: 14px;">
            Go to My Events →
          </a>
        </div>

        <a href="faculty-dashboard.html" class="back-link">← Back to Dashboard</a>

        <p class="note">
          <i class="fas fa-cloud"></i>
          All data is securely pushed to <b>EAC_Database</b> via Google Cloud Services.
        </p>
      </div>
    </div>
  </main>

  <script>
    // Check login — faculty only
    const user = JSON.parse(sessionStorage.getItem('user'));
    if (!user || user.role !== 'faculty') {
      window.location.href = 'loginpage.html';
    }

    // Active sidebar link
    const currentPage = window.location.pathname.split('/').pop();
    document.querySelectorAll('.sidebar a').forEach(link => {
      if (link.getAttribute('href') === currentPage) {
        link.classList.add('active');
      }
    });

    // Logout
    function logout() {
      sessionStorage.removeItem('user');
      window.location.href = 'loginpage.html';
    }

    // Format date
    function formatEventDate(date, time) {
      const months = ["January","February","March","April","May","June",
                      "July","August","September","October","November","December"];
      const [year, month, day] = date.split("-");
      let [hour, minute] = time.split(":");
      hour = parseInt(hour);
      const ampm = hour >= 12 ? "PM" : "AM";
      hour = hour % 12 || 12;
      return `${months[parseInt(month)-1]} ${parseInt(day)}, ${year} ${hour}:${minute} ${ampm}`;
    }

    // Create event
    async function createEventRealTime() {
      const scriptURL = 'https://script.google.com/macros/s/AKfycbyp7Y6S2g1ov_xXH8BONmBRe75lqrEDMRFaamUcyvbJTgZfD00vZB6x34o1co6gVOSt/exec';

      const name     = document.getElementById('eventTitle').value.trim();
      const dateVal  = document.getElementById('eventDate').value;
      const timeVal  = document.getElementById('eventTime').value;
      const location = document.getElementById('eventVenue').value.trim();
      const notes    = document.getElementById('eventNote').value.trim();

      if (!name || !dateVal) {
        alert("Event Title and Date are required!");
        return;
      }

      const date = formatEventDate(dateVal, timeVal);
      const btn  = document.querySelector('.create-btn');
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Syncing to Cloud...';
      btn.disabled  = true;

      try {
      const user = JSON.parse(sessionStorage.getItem('user'));

      const url = `${scriptURL}?action=createEvent` +
        `&name=${encodeURIComponent(name)}` +
        `&date=${encodeURIComponent(date)}` +
        `&location=${encodeURIComponent(location)}` +
        `&notes=${encodeURIComponent(notes)}` +
        `&faculty=${encodeURIComponent(user.email)}`;

        await fetch(url, { method: "GET", redirect: "follow" });

        alert(`Success! "${name}" is now live for all students.`);

        // Clear form
        document.getElementById('eventTitle').value = "";
        document.getElementById('eventDate').value  = "";
        document.getElementById('eventTime').value  = "";
        document.getElementById('eventVenue').value = "";
        document.getElementById('eventNote').value  = "";

      } catch (error) {
        alert('Cloud connection failed. Please try again.');
      } finally {
        btn.innerHTML = '<i class="fas fa-plus"></i> Create Event';
        btn.disabled  = false;
      }
    }
  </script>

</body>
</html>

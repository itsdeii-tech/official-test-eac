<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Attendance - EAC</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, Helvetica, sans-serif;
      background-color: #f0f4f0;
      color: #223322;
      min-height: 100vh;
    }

    .sidebar {
      width: 70px;
      background-color: #006400;
      color: white;
      padding: 20px 10px;
      height: 100vh;
      position: fixed;
      left: 0;
      top: 0;
      overflow: hidden;
      transition: width 0.3s ease, transform 0.3s ease;
      z-index: 1000;
    }
    .sidebar:hover { width: 230px; }
    .sidebar-text { display: none; white-space: nowrap; }
    .sidebar:hover .sidebar-text { display: inline; }
    .sidebar-logo { width: 50px; margin: 0 auto 20px; display: block; border-radius: 50%; transition: width 0.3s ease; }
    .sidebar:hover .sidebar-logo { width: 110px; }
    .sidebar a { display: flex; align-items: center; color: white; text-decoration: none; padding: 11px 10px; margin-bottom: 4px; border-radius: 6px; transition: background 0.2s; font-size: 14px; position: relative; }
    .sidebar a:hover, .sidebar a.active { background-color: #228B22; color: white; }
    .sidebar i { min-width: 24px; font-size: 17px; text-align: center; margin-right: 0; transition: margin 0.3s ease; }
    .sidebar:hover i { margin-right: 12px; }
    .sidebar:not(:hover) a:hover { display: block; }

    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 999;
    }
    .overlay.active { display: block; }

    .hamburger {
      display: none;
      background: none;
      border: none;
      color: white;
      font-size: 22px;
      cursor: pointer;
      padding: 5px;
    }

    .main {
      margin-left: 70px;
      min-height: 100vh;
    }

    .top-bar {
      background-color: #006400;
      color: white;
      padding: 0 28px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
    }
    .top-bar-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .top-bar-left h1 {
      font-size: 18px;
      font-weight: bold;
    }

    .content-wrap {
      padding: 28px;
    }

    .records-card {
      background: white;
      border: 1px solid #d6e9d6;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(7, 54, 16, 0.06);
      overflow: hidden;
    }

    .records-head {
      padding: 22px 26px 10px;
    }
    .records-head h2 {
      color: #0d5f21;
      font-size: 18px;
      margin-bottom: 8px;
    }
    .records-head p {
      color: #577257;
      font-size: 13px;
      line-height: 1.6;
    }

    .table-wrap {
      overflow-x: auto;
      padding: 10px 26px 24px;
    }

    .attendance-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      min-width: 1050px;
    }
    .attendance-table thead tr {
      background: #f4faf4;
    }
    .attendance-table th {
      padding: 14px 18px;
      border-bottom: 2px solid #d3e6d3;
      color: #007200;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      text-align: left;
      white-space: nowrap;
    }
    .attendance-table td {
      padding: 18px;
      border-bottom: 1px solid #ebf3eb;
      vertical-align: middle;
      color: #213821;
    }
    .attendance-table tr:last-child td {
      border-bottom: none;
    }

    .event-name {
      font-size: 16px;
      font-weight: 700;
      color: #132f13;
      line-height: 1.4;
    }
    .event-note {
      margin-top: 6px;
      font-size: 12px;
      color: #698169;
      line-height: 1.5;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 7px 14px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }
    .status-completed {
      background: #dff3e6;
      color: #006c1f;
    }
    .status-present {
      background: #e7f6eb;
      color: #1b7d35;
    }
    .status-registered {
      background: #fff3e1;
      color: #b27000;
    }

    .muted {
      color: #6e856e;
    }

    .loading-text,
    .empty-text,
    .error-text {
      text-align: center;
      padding: 36px 20px;
      font-size: 14px;
    }
    .loading-text,
    .empty-text {
      color: #879a87;
    }
    .error-text {
      color: #dc2626;
    }

    @media (max-width: 768px) {
      .sidebar {
        width: 230px;
        transform: translateX(-100%);
      }
      .sidebar:hover { width: 230px; }
      .sidebar.mobile-open { transform: translateX(0); }
      .sidebar.mobile-open .sidebar-text { display: inline; }
      .sidebar.mobile-open i { margin-right: 12px; }
      .sidebar.mobile-open .sidebar-logo { width: 110px; }
      .main { margin-left: 0; }
      .top-bar { padding: 0 15px; }
      .top-bar-left h1 { font-size: 15px; }
      .hamburger { display: block; }
      .content-wrap { padding: 15px; }
      .records-head { padding: 18px 18px 8px; }
      .table-wrap { padding: 8px 18px 18px; }
    }
  </style>
</head>
<body>
  <div class="overlay" id="overlay" onclick="closeMobileSidebar()"></div>

  <nav class="sidebar" id="sidebar">
    <img src="images/asiatech_logo.jpg" alt="ASIATECH Logo" class="sidebar-logo">
    <a href="student-dashboard.html"><i class="fas fa-home"></i><span class="sidebar-text">Dashboard</span></a>
    <a href="student-profile.html"><i class="fas fa-user-circle"></i><span class="sidebar-text">Profile</span></a>
    <a href="student-attendance.html"><i class="fas fa-calendar-check"></i><span class="sidebar-text">My Attendance</span></a>
    <a href="student-settings.html"><i class="fas fa-cog"></i><span class="sidebar-text">Settings</span></a>
    <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i><span class="sidebar-text">Logout</span></a>
  </nav>

  <main class="main">
    <div class="top-bar">
      <div class="top-bar-left">
        <button class="hamburger" onclick="toggleMobileSidebar()">
          <i class="fas fa-bars"></i>
        </button>
        <div>
          <h1>My Attendance</h1>
        </div>
      </div>
    </div>

    <div class="content-wrap">
      <section class="records-card">
        <div class="records-head">
          <h2>Attendance Records</h2>
          <p>Your full event attendance list with schedule details, live status, and scan timestamps.</p>
        </div>

        <div class="table-wrap">
          <table class="attendance-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Event</th>
                <th>Schedule</th>
                <th>Location</th>
                <th>Status</th>
                <th>Check-in</th>
                <th>Check-out</th>
              </tr>
            </thead>
            <tbody id="attendance-tbody">
              <tr>
                <td colspan="7" class="loading-text">
                  <i class="fas fa-spinner fa-spin"></i> Loading attendance records...
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </div>
  </main>

  <script>
    const user = JSON.parse(sessionStorage.getItem("user"));
    if (!user || user.role !== "student") {
      window.location.href = "loginpage.html";
    }

    const currentPage = window.location.pathname.split("/").pop();
    document.querySelectorAll(".sidebar a").forEach(function(link) {
      if (link.getAttribute("href") === currentPage) link.classList.add("active");
    });

    function logout() {
      if (confirm("Are you sure you want to logout?")) {
        sessionStorage.removeItem("user");
        window.location.href = "loginpage.html";
      }
    }

    function toggleMobileSidebar() {
      document.getElementById("sidebar").classList.toggle("mobile-open");
      document.getElementById("overlay").classList.toggle("active");
    }

    function closeMobileSidebar() {
      document.getElementById("sidebar").classList.remove("mobile-open");
      document.getElementById("overlay").classList.remove("active");
    }

    const scriptURL = "https://script.google.com/macros/s/AKfycbzYdDr94uC7aByOQG7l2DNXUuIVfUxmn5aHBdl5_ZHvCabQoz0wHNSAtTdnRPVwepRK4g/exec";

    function escapeHtml(value) {
      return (value || "").toString()
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function normalize(value) {
      return (value || "").toString().trim().toLowerCase();
    }

    function parseDate(value) {
      const date = new Date(value);
      return isNaN(date.getTime()) ? null : date;
    }

    function formatSchedule(value) {
      const date = parseDate(value);
      if (!date) return "Schedule unavailable";
      return date.toLocaleString("en-US", {
        year: "numeric",
        month: "long",
        day: "numeric",
        hour: "numeric",
        minute: "2-digit"
      });
    }

    function statusClass(status) {
      if (status === "COMPLETED (OUT)") return "status-completed";
      if (status === "PRESENT") return "status-present";
      return "status-registered";
    }

    function statusIcon(status) {
      if (status === "COMPLETED (OUT)") return "fa-door-open";
      if (status === "PRESENT") return "fa-user-check";
      return "fa-hourglass-half";
    }

    async function loadAttendance() {
      const tbody = document.getElementById("attendance-tbody");

      try {
        const responses = await Promise.all([
          fetch(`${scriptURL}?action=getStudentAttendance&email=${encodeURIComponent(user.email)}`, { method: "GET", redirect: "follow" }),
          fetch(`${scriptURL}?action=getEvents`, { method: "GET", redirect: "follow" })
        ]);

        const attendanceResult = await responses[0].json();
        const eventResult = await responses[1].json();

        const records = attendanceResult && attendanceResult.success && Array.isArray(attendanceResult.data)
          ? attendanceResult.data
          : [];

        const events = Array.isArray(eventResult) ? eventResult : [];
        const eventMap = {};

        events.forEach(function(event) {
          eventMap[normalize(event.name)] = event;
        });

        if (!records.length) {
          tbody.innerHTML = `
            <tr>
              <td colspan="7" class="empty-text">
                <i class="fas fa-calendar-xmark"></i> No attendance records found.
              </td>
            </tr>`;
          return;
        }

        const sortedRecords = records.slice();

        tbody.innerHTML = sortedRecords.map(function(row, index) {
          const eventMeta = eventMap[normalize(row.eventName)] || {};
          const note = eventMeta.notes ? `<div class="event-note">${escapeHtml(eventMeta.notes)}</div>` : "";
          const schedule = formatSchedule(eventMeta.date);
          const location = eventMeta.location || "TBA";

          return `
            <tr>
              <td>${index + 1}</td>
              <td>
                <div class="event-name">${escapeHtml(row.eventName)}</div>
                ${note}
              </td>
              <td>${escapeHtml(schedule)}</td>
              <td>${escapeHtml(location)}</td>
              <td>
                <span class="status-badge ${statusClass(row.status)}">
                  <i class="fas ${statusIcon(row.status)}"></i>
                  ${escapeHtml(row.status || "REGISTERED")}
                </span>
              </td>
              <td>${escapeHtml(row.checkIn || "-")}</td>
              <td>${escapeHtml(row.checkOut || "-")}</td>
            </tr>
          `;
        }).join("");

      } catch (error) {
        tbody.innerHTML = `
          <tr>
            <td colspan="7" class="error-text">Failed to load attendance records.</td>
          </tr>`;
      }
    }

    window.onload = function() {
      loadAttendance();
      setInterval(loadAttendance, 30000);
    };
  </script>
</body>
</html>

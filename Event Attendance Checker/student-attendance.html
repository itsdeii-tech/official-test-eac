<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Attendance - EAC</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: Arial, Helvetica, sans-serif; background-color: #f0f4f0; color: #333; min-height: 100vh; }

    /* SIDEBAR */
    .sidebar {
      width: 70px;
      background-color: #006400;
      color: white;
      padding: 20px 10px;
      height: 100vh;
      position: fixed;
      left: 0; top: 0;
      overflow: hidden;
      transition: width 0.3s ease, transform 0.3s ease;
      z-index: 1000;
    }
    .sidebar:hover { width: 230px; }
    .sidebar-text { display: none; white-space: nowrap; }
    .sidebar:hover .sidebar-text { display: inline; }
    .sidebar-logo { width: 50px; margin: 0 auto 20px; display: block; border-radius: 50%; transition: width 0.3s ease; }
    .sidebar:hover .sidebar-logo { width: 110px; }
    .sidebar a { display: flex; align-items: center; color: white; text-decoration: none; padding: 11px 10px; margin-bottom: 4px; border-radius: 6px; transition: background 0.2s; font-size: 14px; position: relative; }
    .sidebar a:hover, .sidebar a.active { background-color: #228B22; }
    .sidebar i { min-width: 24px; font-size: 17px; text-align: center; margin-right: 0; transition: margin 0.3s ease; }
    .sidebar:hover i { margin-right: 12px; }
    .tooltip { display: none; position: absolute; left: 72px; top: 50%; transform: translateY(-50%); background: #333; color: white; padding: 5px 10px; border-radius: 5px; font-size: 12px; white-space: nowrap; z-index: 9999; pointer-events: none; }
    .sidebar:not(:hover) a:hover .tooltip { display: block; }

    /* OVERLAY */
    .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 999; }
    .overlay.active { display: block; }

    /* HAMBURGER */
    .hamburger { display: none; background: none; border: none; color: white; font-size: 22px; cursor: pointer; padding: 5px; }

    /* MAIN */
    .main { margin-left: 70px; min-height: 100vh; }

    /* TOP BAR */
    .top-bar { background-color: #006400; color: white; padding: 0 28px; height: 64px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 8px rgba(0,0,0,0.15); cursor: default;}
    .top-bar-left { display: flex; align-items: center; gap: 12px; }
    .top-bar-left h1 { font-size: 18px; font-weight: bold;}



    /* CONTENT */
    .content-wrap { padding: 24px 28px; cursor:default ;}

    /* TOOLBAR ROW */
    .toolbar-row { display: flex; align-items: center; gap: 12px; margin-bottom: 22px; flex-wrap: wrap; }
    .stat-chip { background: white; border: 1px solid #d4e8d4; border-radius: 8px; padding: 9px 16px; display: flex; align-items: center; gap: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.05); white-space: nowrap; }
    .stat-chip i { color: #006400; font-size: 15px; }
    .stat-chip .num { font-size: 16px; font-weight: bold; color: #1a2e1a; }
    .stat-chip .lbl { font-size: 12px; color: #7a9a7a; margin-left: 3px; }
    .divider { width: 1px; height: 32px; background: #d4e8d4; flex-shrink: 0; }

    /* CARD */
    .card { background: white; border: 1px solid #d4e8d4; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
    .card-head { padding: 14px 20px; border-bottom: 1px solid #e8f0e8; background: #f5faf5; }
    .card-head h2 { font-size: 15px; color: #006400; display: flex; align-items: center; gap: 8px; }

    /* TABLE */
    .table-wrap { overflow-x: auto; }
    .attendance-table { width: 100%; border-collapse: collapse; font-size: 14px; min-width: 550px; }
    .attendance-table thead tr { background: #f5faf5; }
    .attendance-table th { padding: 10px 14px; border-bottom: 2px solid #d4e8d4; color: #006400; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; text-align: left; }
    .attendance-table td { padding: 13px 14px; border-bottom: 1px solid #f0f5f0; vertical-align: middle; }
    .attendance-table tr:last-child td { border-bottom: none; }
    .attendance-table tr:hover td { background: #fafff8; }

    /* BADGES */
    .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
    .badge-present  { background: #e8f5e9; color: #228B22; }
    .badge-absent   { background: #fff5f5; color: #dc2626; }
    .badge-complete { background: #e8f5e9; color: #006400; }

    .loading-text { text-align: center; color: #aaa; padding: 36px; font-size: 14px; }
    .empty-text   { text-align: center; color: #aaa; padding: 36px; font-size: 14px; }

    /* MOBILE */
    @media (max-width: 768px) {
      .sidebar { width: 230px; transform: translateX(-100%); }
      .sidebar:hover { width: 230px; }
      .sidebar.mobile-open { transform: translateX(0); }
      .sidebar.mobile-open .sidebar-text { display: inline; }
      .sidebar.mobile-open i { margin-right: 12px; }
      .sidebar.mobile-open .sidebar-logo { width: 110px; }
      .main { margin-left: 0; }
      .top-bar { padding: 0 15px; }
      .top-bar-left h1 { font-size: 15px; }
      .top-bar-left p { display: none; }
      .top-bar-right { gap: 6px; }
      .date-chip { display: none; }
      .greeting-chip { font-size: 11px; padding: 5px 10px; }
      .hamburger { display: block; }
      .content-wrap { padding: 15px; }
      .toolbar-row { gap: 8px; }
      .divider { display: none; }
      .stat-chip .lbl { display: none; }
    }

    @media (max-width: 480px) {
      .top-bar-right { display: none; }
    }
  </style>
</head>
<body>

  <!-- OVERLAY -->
  <div class="overlay" id="overlay" onclick="closeMobileSidebar()"></div>

  <!-- SIDEBAR -->
  <nav class="sidebar" id="sidebar">
    <img src="images/asiatech_logo.jpg" alt="ASIATECH Logo" class="sidebar-logo">
    <a href="student-dashboard.html"><i class="fas fa-home"></i><span class="sidebar-text">Dashboard</span><span class="tooltip">Dashboard</span></a>
    <a href="student-profile.html"><i class="fas fa-user-circle"></i><span class="sidebar-text">Profile</span><span class="tooltip">Profile</span></a>
    <a href="student-attendance.html"><i class="fas fa-calendar-check"></i><span class="sidebar-text">My Attendance</span><span class="tooltip">My Attendance</span></a>
    <a href="student-settings.html"><i class="fas fa-cog"></i><span class="sidebar-text">Settings</span><span class="tooltip">Settings</span></a>
    <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i><span class="sidebar-text">Logout</span><span class="tooltip">Logout</span></a>
  </nav>

  <!-- MAIN -->
  <main class="main">

    <div class="top-bar">
      <div class="top-bar-left">
        <button class="hamburger" onclick="toggleMobileSidebar()">
          <i class="fas fa-bars"></i>
        </button>
        <div>
          <h1>My Attendance</h1>
        </div>
      </div>
    </div>

    <div class="content-wrap">

      <!-- TOOLBAR ROW -->
      <div class="toolbar-row">
        <div class="stat-chip">
          <i class="fas fa-calendar-check"></i>
          <span class="num" id="stat-total">—</span>
          <span class="lbl">Total Registered</span>
        </div>
        <div class="stat-chip">
          <i class="fas fa-circle-check"></i>
          <span class="num" id="stat-present">—</span>
          <span class="lbl">Present</span>
        </div>
        <div class="stat-chip">
          <i class="fas fa-circle-xmark"></i>
          <span class="num" id="stat-absent">—</span>
          <span class="lbl">Registered</span>
        </div>
      </div>

      <!-- TABLE CARD -->
      <div class="card">
        <div class="card-head">
          <h2><i class="fas fa-calendar-check"></i> My Event Attendance</h2>
        </div>
        <div class="table-wrap">
          <table class="attendance-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Event Name</th>
                <th>Course</th>
                <th>Year Level</th>
                <th>Section</th>
                <th>Status</th>
                <th>Check-in</th>
                <th>Check-out</th>
              </tr>
            </thead>
            <tbody id="attendance-tbody">
              <tr>
                <td colspan="8" class="loading-text">
                  <i class="fas fa-spinner fa-spin"></i> Loading attendance records...
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </main>

  <script>
    // Check login
    const user = JSON.parse(sessionStorage.getItem('user'));
    if (!user || user.role !== 'student') {
      window.location.href = 'loginpage.html';
    }

    // Active sidebar
    const currentPage = window.location.pathname.split('/').pop();
    document.querySelectorAll('.sidebar a').forEach(link => {
      if (link.getAttribute('href') === currentPage) link.classList.add('active');
    });

    // Logout
    function logout() {
      if (confirm("Are you sure you want to logout?")) {
        sessionStorage.removeItem('user');
        window.location.href = 'loginpage.html';
      }
    }

    // Mobile sidebar
    function toggleMobileSidebar() {
      document.getElementById('sidebar').classList.toggle('mobile-open');
      document.getElementById('overlay').classList.toggle('active');
    }
    function closeMobileSidebar() {
      document.getElementById('sidebar').classList.remove('mobile-open');
      document.getElementById('overlay').classList.remove('active');
    }


    const scriptURL = 'https://script.google.com/macros/s/AKfycbzYdDr94uC7aByOQG7l2DNXUuIVfUxmn5aHBdl5_ZHvCabQoz0wHNSAtTdnRPVwepRK4g/exec';

    async function loadAttendance() {
      const tbody = document.getElementById('attendance-tbody');

      try {
        const url      = `${scriptURL}?action=getStudentAttendance&email=${encodeURIComponent(user.email)}`;
        const response = await fetch(url, { method: "GET", redirect: "follow" });
        const result   = await response.json();

        if (!result.success || result.data.length === 0) {
          tbody.innerHTML = `
            <tr>
              <td colspan="8" class="empty-text">
                <i class="fas fa-calendar-xmark"></i> No attendance records found.
              </td>
            </tr>`;
          updateStats(0, 0, 0);
          return;
        }

        // Count stats
        let present = 0;
        let absent  = 0;

        tbody.innerHTML = "";
        result.data.forEach((row, i) => {
          const isPresent  = row.status === 'PRESENT' || row.status === 'COMPLETED (OUT)';
          const isAbsent   = row.status === 'REGISTERED';
          if (isPresent) present++;
          if (isAbsent)  absent++;

          const badgeClass =
            row.status === 'PRESENT'         ? 'badge-present'  :
            row.status === 'COMPLETED (OUT)'  ? 'badge-complete' :
            'badge-absent';

          tbody.innerHTML += `
            <tr>
              <td>${i + 1}</td>
              <td><strong>${row.eventName}</strong></td>
              <td>${row.course}</td>
              <td>${row.yearLevel}</td>
              <td>${row.section}</td>
              <td><span class="badge ${badgeClass}">${row.status}</span></td>
              <td>${row.checkIn  || '—'}</td>
              <td>${row.checkOut || '—'}</td>
            </tr>
          `;
        });

        updateStats(result.total, present, absent);

      } catch (err) {
        tbody.innerHTML = `<tr><td colspan="8" style="color:#dc2626; text-align:center; padding:20px;">Failed to load records.</td></tr>`;
      }
    }

    function updateStats(total, present, absent) {
      document.getElementById('stat-total').textContent   = total;
      document.getElementById('stat-present').textContent = present;
      document.getElementById('stat-absent').textContent  = absent;
    }

    window.onload = () => {
      loadAttendance();
      setInterval(loadAttendance, 30000); // Auto-refresh every 30 seconds
    };
  </script>

</body>
</html>

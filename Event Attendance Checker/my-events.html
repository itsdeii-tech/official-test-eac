<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Events - CEITE</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: Arial, Helvetica, sans-serif; background-color: #f0f4f0; color: #333; min-height: 100vh; }

    /* SIDEBAR */
    .sidebar {
      width: 70px;
      background-color: #006400;
      color: white;
      padding: 20px 10px;
      height: 100vh;
      position: fixed;
      left: 0; top: 0;
      overflow: hidden;
      transition: width 0.3s ease, transform 0.3s ease;
      z-index: 1000;
    }
    .sidebar:hover { width: 230px; }
    .sidebar-text { display: none; white-space: nowrap; }
    .sidebar:hover .sidebar-text { display: inline; }
    .sidebar-logo { width: 50px; margin: 0 auto 20px; display: block; border-radius: 50%; transition: width 0.3s ease; }
    .sidebar:hover .sidebar-logo { width: 110px; }
    .sidebar a { display: flex; align-items: center; color: rgba(255,255,255,0.85); text-decoration: none; padding: 11px 10px; margin-bottom: 4px; border-radius: 6px; transition: background 0.2s; font-size: 14px; position: relative; }
    .sidebar a:hover, .sidebar a.active { background-color: #228B22; color: white; }
    .sidebar i { min-width: 24px; font-size: 17px; text-align: center; margin-right: 0; transition: margin 0.3s ease; }
    .sidebar:hover i { margin-right: 12px; }
    .tooltip { display: none; position: absolute; left: 72px; top: 50%; transform: translateY(-50%); background: #006400; color: white; padding: 5px 10px; border-radius: 5px; font-size: 12px; white-space: nowrap; z-index: 9999; pointer-events: none; }
    .sidebar:not(:hover) a:hover .tooltip { display: block; }

    /* OVERLAY */
    .overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 999;
    }
    .overlay.active { display: block; }

    /* HAMBURGER */
    .hamburger {
      display: none;
      background: none;
      border: none;
      color: white;
      font-size: 22px;
      cursor: pointer;
      padding: 5px;
    }

    /* MAIN */
    .main { margin-left: 70px; min-height: 100vh; }

    /* TOP BAR */
    .top-bar { background-color: #006400; color: white; padding: 0 28px; height: 64px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
    .top-bar-left { display: flex; align-items: center; gap: 12px; }
    .top-bar-left h1 { font-size: 18px; font-weight: bold; }
    .top-bar-left p { font-size: 12px; opacity: 0.75; margin-top: 2px; }

    /* CONTENT */
    .content-wrap { padding: 24px 28px; }

    /* TOOLBAR ROW */
    .toolbar-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 22px;
      flex-wrap: wrap;
    }
    .stat-chip {
      background: white;
      border: 1px solid #d4e8d4;
      border-radius: 8px;
      padding: 9px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
      white-space: nowrap;
    }
    .stat-chip i { color: #006400; font-size: 15px; }
    .stat-chip .num { font-size: 16px; font-weight: bold; color: #1a2e1a; }
    .stat-chip .lbl { font-size: 12px; color: #7a9a7a; margin-left: 3px; }
    .divider { width: 1px; height: 32px; background: #d4e8d4; flex-shrink: 0; }

    /* BUTTONS */
    .btn { padding: 9px 18px; font-size: 13px; font-weight: bold; color: white; border: none; border-radius: 8px; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 7px; transition: opacity 0.2s; font-family: inherit; white-space: nowrap; }
    .btn:hover { opacity: 0.88; }
    .btn-primary { background: #228B22; }

    /* CARD */
    .card { background: white; border: 1px solid #d4e8d4; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
    .card-head { padding: 14px 20px; border-bottom: 1px solid #e8f0e8; background: #f5faf5; display: flex; align-items: center; justify-content: space-between; }
    .card-head h2 { font-size: 15px; color: #006400; display: flex; align-items: center; gap: 8px; }
    .card-head p { color: #888; font-size: 13px; }

    /* TABLE */
    .table-wrap { overflow-x: auto; }
    .events-table { width: 100%; border-collapse: collapse; font-size: 14px; min-width: 550px; }
    .events-table thead tr { background: #f5faf5; }
    .events-table th { padding: 10px 14px; border-bottom: 2px solid #d4e8d4; color: #006400; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; text-align: left; }
    .events-table td { padding: 13px 14px; border-bottom: 1px solid #f0f5f0; vertical-align: middle; }
    .events-table tr:last-child td { border-bottom: none; }
    .events-table tr:hover td { background: #fafff8; }

    .delete-btn {
      background: #dc3545;
      color: white;
      padding: 6px 13px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      transition: opacity 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    .delete-btn:hover { opacity: 0.85; }

    .loading-text { text-align: center; color: #aaa; padding: 36px; font-size: 14px; }
    .empty-text   { text-align: center; color: #aaa; padding: 36px; font-size: 14px; }

    /* MOBILE RESPONSIVE */
    @media (max-width: 768px) {
      .sidebar {
        width: 230px;
        transform: translateX(-100%);
      }
      .sidebar:hover { width: 230px; }
      .sidebar.mobile-open { transform: translateX(0); }
      .sidebar.mobile-open .sidebar-text { display: inline; }
      .sidebar.mobile-open i { margin-right: 12px; }
      .sidebar.mobile-open .sidebar-logo { width: 110px; }
      .main { margin-left: 0; }
      .top-bar { padding: 0 15px; }
      .top-bar-left h1 { font-size: 15px; }
      .top-bar-left p { display: none; }
      .hamburger { display: block; }
      .content-wrap { padding: 15px; }
      .toolbar-row { gap: 8px; }
      .divider { display: none; }
      .btn { padding: 8px 14px; font-size: 12px; }
      .stat-chip .lbl { display: none; }
    }

    @media (max-width: 480px) {
      .top-bar-left h1 { font-size: 14px; }
    }
  </style>
</head>
<body>

  <!-- OVERLAY -->
  <div class="overlay" id="overlay" onclick="closeMobileSidebar()"></div>

  <!-- SIDEBAR -->
  <nav class="sidebar" id="sidebar">
    <img src="images/asiatech_logo.jpg" alt="ASIATECH Logo" class="sidebar-logo">
    <a href="faculty-dashboard.html"><i class="fas fa-home"></i><span class="sidebar-text">Dashboard</span><span class="tooltip">Dashboard</span></a>
    <a href="create-event.html"><i class="fas fa-plus-circle"></i><span class="sidebar-text">Post New Event</span><span class="tooltip">Post New Event</span></a>
    <a href="my-events.html"><i class="fas fa-calendar-alt"></i><span class="sidebar-text">My Events</span><span class="tooltip">My Events</span></a>
    <a href="scan-qr.html"><i class="fas fa-qrcode"></i><span class="sidebar-text">Scan QR Code</span><span class="tooltip">Scan QR Code</span></a>
    <a href="view-records.html"><i class="fas fa-list-check"></i><span class="sidebar-text">Reports</span><span class="tooltip">Reports</span></a>
    <a href="faculty-profile.html"><i class="fas fa-user-circle"></i><span class="sidebar-text">Profile</span><span class="tooltip">Profile</span></a>
    <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i><span class="sidebar-text">Logout</span><span class="tooltip">Logout</span></a>
  </nav>

  <!-- MAIN -->
  <main class="main">

    <div class="top-bar">
      <div class="top-bar-left">
        <button class="hamburger" onclick="toggleMobileSidebar()">
          <i class="fas fa-bars"></i>
        </button>
        <div>
          <h1>My Events</h1>
        </div>
      </div>
    </div>

    <div class="content-wrap">

      <!-- TOOLBAR ROW -->
      <div class="toolbar-row">
        <div class="stat-chip">
          <i class="fas fa-calendar-alt"></i>
          <span class="num" id="event-count">—</span>
          <span class="lbl">My Events</span>
        </div>
        <div class="divider"></div>
        <a href="create-event.html" class="btn btn-primary">
          <i class="fas fa-plus"></i> Create Event
        </a>
      </div>

      <!-- TABLE CARD -->
      <div class="card">
        <div class="card-head">
          <h2><i class="fas fa-calendar-alt"></i> My Posted Events</h2>
        </div>
        <div class="table-wrap">
          <table class="events-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Event Title</th>
                <th>Date / Time</th>
                <th>Venue</th>
                <th>Notes</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="events-table-body">
              <tr>
                <td colspan="6" class="loading-text">
                  <i class="fas fa-spinner fa-spin"></i> Loading your events...
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </main>

  <script>
    const user = JSON.parse(sessionStorage.getItem('user'));
    if (!user || user.role !== 'faculty') {
      window.location.href = 'loginpage.html';
    }

    const currentPage = window.location.pathname.split('/').pop();
    document.querySelectorAll('.sidebar a').forEach(link => {
      if (link.getAttribute('href') === currentPage) link.classList.add('active');
    });

    function logout() {
      sessionStorage.removeItem('user');
      window.location.href = 'loginpage.html';
    }

    function toggleMobileSidebar() {
      document.getElementById('sidebar').classList.toggle('mobile-open');
      document.getElementById('overlay').classList.toggle('active');
    }
    function closeMobileSidebar() {
      document.getElementById('sidebar').classList.remove('mobile-open');
      document.getElementById('overlay').classList.remove('active');
    }

    const scriptURL = 'https://script.google.com/macros/s/AKfycbzYdDr94uC7aByOQG7l2DNXUuIVfUxmn5aHBdl5_ZHvCabQoz0wHNSAtTdnRPVwepRK4g/exec';

    function formatDate(dateStr) {
      if (dateStr && dateStr.toString().includes('T')) {
        var date = new Date(dateStr);
        return date.toLocaleDateString('en-US', {
          year: 'numeric', month: 'long', day: 'numeric',
          hour: '2-digit', minute: '2-digit',
          timeZone: 'Asia/Manila'
        });
      }
      return dateStr;
    }

    async function loadMyEvents() {
      const tbody = document.getElementById('events-table-body');
      const count = document.getElementById('event-count');

      try {
        const url = `${scriptURL}?action=getMyEvents&faculty=${encodeURIComponent(user.email)}`;
        const response = await fetch(url, { method: "GET", redirect: "follow" });
        const events   = await response.json();

        if (events.length === 0) {
          tbody.innerHTML = `
            <tr>
              <td colspan="6" class="empty-text">
                <i>No events found.</i> 
                <a href="create-event.html" style="color:#006400; font-weight:bold; margin-left:5px;">Create</a>
              </td>
            </tr>`;
          count.textContent = "0";
          return;
        }

        count.textContent = events.length;
        tbody.innerHTML = "";

        events.forEach((event, index) => {
          tbody.innerHTML += `
            <tr>
              <td>${index + 1}</td>
              <td><strong>${event.name}</strong></td>
              <td>${formatDate(event.date)}</td>
              <td>${event.location || '—'}</td>
              <td>${event.notes || '—'}</td>
              <td>
                <button class="delete-btn" onclick="deleteEvent('${event.name.replace(/'/g, "\\'")}')">
                  <i class="fas fa-trash"></i> Delete
                </button>
              </td>
            </tr>
          `;
        });

      } catch (err) {
        tbody.innerHTML = `<tr><td colspan="6" style="color:#dc2626; text-align:center; padding:20px;">Failed to load events.</td></tr>`;
        count.textContent = "—";
      }
    }

    async function deleteEvent(eventName) {
      if (!confirm(`Are you sure you want to delete "${eventName}"?`)) return;

      try {
        const url = `${scriptURL}?action=deleteEvent&name=${encodeURIComponent(eventName)}&faculty=${encodeURIComponent(user.email)}`;
        const response = await fetch(url, { method: "GET", redirect: "follow" });
        const result   = await response.json();

        if (result.success) {
          alert(`"${eventName}" deleted successfully!`);
          loadMyEvents();
        } else {
          alert("Failed to delete: " + result.message);
        }
      } catch (err) {
        alert("Connection failed. Please try again.");
      }
    }

    window.onload = loadMyEvents;
  </script>

</body>
</html>

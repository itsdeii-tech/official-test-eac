<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> Faculty Reports - EAC</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: Arial, Helvetica, sans-serif;
      background-color: #f0f4f0;
      color: #333;
      min-height: 100vh;
    }
    
    /* SIDEBAR */
    .sidebar {
      width: 70px;
      background-color: #006400;
      color: white;
      padding: 20px 10px;
      height: 100vh;
      position: fixed;
      left: 0;
      top: 0;
      overflow: hidden;
      transition: width 0.3s ease, transform 0.3s ease;
      z-index: 1000;
    }
    
    .sidebar:hover {
      width: 230px;
    }
    
    .sidebar-text {
      display: none;
      white-space: nowrap;
    }
    
    .sidebar:hover .sidebar-text {
      display: inline;
    }
    
    .sidebar-logo {
      width: 50px;
      margin: 0 auto 20px;
      display: block;
      border-radius: 50%;
      transition: width 0.3s ease;
    }
    
    .sidebar:hover .sidebar-logo {
      width: 110px;
    }
    
    .sidebar a {
      display: flex;
      align-items: center;
      color: rgba(255, 255, 255, 0.85);
      text-decoration: none;
      padding: 11px 10px;
      margin-bottom: 4px;
      border-radius: 6px;
      transition: background 0.2s;
      font-size: 14px;
      position: relative;
    }
    
    .sidebar a:hover, .sidebar a.active {
      background-color: #228B22;
      color: white;
    }
    
    .sidebar i {
      min-width: 24px;
      font-size: 17px;
      text-align: center;
      margin-right: 0;
      transition: margin 0.3s ease;
    }
    
    .sidebar:hover i {
      margin-right: 12px;
    }
    
    .sidebar:not(:hover) a:hover {
      display: block;
    }
    
    /* OVERLAY */
    .overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 999;
    }
    
    .overlay.active {
      display: block;
    }
    
    /* HAMBURGER */
    .hamburger {
      display: none;
      background: none;
      border: none;
      color: white;
      font-size: 22px;
      cursor: pointer;
      padding: 5px;
    }
    
    /* MAIN */
    .main {
      margin-left: 70px;
      min-height: 100vh;
    }
    
    /* TOP BAR */
    .top-bar {
      background-color: #006400;
      color: white;
      padding: 0 28px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
      cursor: default;
    }
    
    .top-bar-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .top-bar-left h1 {
      font-size: 18px;
      font-weight: bold;
    }
    
    /* CONTENT */
    .content-wrap {
      padding: 24px 28px;
      cursor: default;
    }
    
    /* CARD */
    .card {
      background: white;
      border: 1px solid #d4e8d4;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.05);
    }
    
    .card-head {
      padding: 14px 20px;
      border-bottom: 1px solid #e8f0e8;
      background: #f5faf5;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }
    
    .card-head h2 {
      font-size: 15px;
      color: #006400;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .card-head p {
      color: #888;
      font-size: 13px;
    }
    
    /* TABLE */
    .table-wrap {
      overflow-x: auto;
    }
    
    .events-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      min-width: 550px;
    }
    
    .events-table thead tr {
      background: #f5faf5;
    }
    
    .events-table th {
      padding: 10px 14px;
      border-bottom: 2px solid #d4e8d4;
      color: #006400;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      text-align: left;
    }
    
    .events-table td {
      padding: 12px 14px;
      border-bottom: 1px solid #f0f5f0;
      vertical-align: middle;
    }
    
    .events-table tr:last-child td {
      border-bottom: none;
    }
    
    .events-table tr:hover td {
      background: #fafff8;
    }
    
    /* ACTION BUTTONS */
    .btn-view {
      background: #006400;
      color: white;
      padding: 6px 12px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-right: 5px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 6px;
    }
    
    .btn-view:hover {
      opacity: 0.85;
    }
    
    .btn-download {
      background: #228B22;
      color: white;
      padding: 6px 12px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      transition: opacity 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    
    .btn-download:hover {
      opacity: 0.85;
    }
    
    /* MODAL */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 2000;
      align-items: center;
      justify-content: center;
      padding: 15px;
    }
    
    .modal-overlay.active {
      display: flex;
    }
    
    .modal {
      background: white;
      border-radius: 10px;
      padding: 25px;
      width: 100%;
      max-width: 850px;
      max-height: 85vh;
      overflow-y: auto;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
    }
    
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      padding-bottom: 12px;
      border-bottom: 2px solid #d4e8d4;
      flex-wrap: wrap;
      gap: 8px;
    }
    
    .modal-header h3 {
      color: #006400;
      font-size: 16px;
    }
    
    .modal-close {
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      color: #888;
    }
    
    .modal-close:hover {
      color: #dc2626;
    }
    
    .modal-actions {
      margin-bottom: 15px;
    }
    
    .btn-csv {
      background: #228B22;
      color: white;
      padding: 8px 18px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    
    .btn-csv:hover {
      opacity: 0.85;
    }
    
    /* ATTENDANCE TABLE */
    .att-wrap {
      overflow-x: auto;
    }
    
    .attendance-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      min-width: 600px;
    }
    
    .attendance-table thead tr {
      background: #006400;
      color: white;
    }
    
    .attendance-table th {
      padding: 10px 12px;
      text-align: left;
    }
    
    .attendance-table td {
      padding: 10px 12px;
      border-bottom: 1px solid #f0f5f0;
    }
    
    .attendance-table tr:last-child td {
      border-bottom: none;
    }
    
    .attendance-table tr:hover td {
      background: #fafff8;
    }
    
    .status-present {
      color: #228B22;
      font-weight: bold;
    }
    
    .status-absent {
      color: #dc2626;
      font-weight: bold;
    }
    
    .status-complete {
      color: #006400;
      font-weight: bold;
    }
    
    .loading-text {
      text-align: center;
      color: #aaa;
      padding: 30px;
      font-size: 14px;
    }
    
    .empty-text {
      text-align: center;
      color: #aaa;
      padding: 30px;
      font-size: 14px;
    }
    
    /* MOBILE RESPONSIVE */
    @media (max-width: 768px) {
      .sidebar {
        width: 230px;
        transform: translateX(-100%);
      }
    
      .sidebar:hover {
        width: 230px;
      }
    
      .sidebar.mobile-open {
        transform: translateX(0);
      }
    
      .sidebar.mobile-open .sidebar-text {
        display: inline;
      }
    
      .sidebar.mobile-open i {
        margin-right: 12px;
      }
    
      .sidebar.mobile-open .sidebar-logo {
        width: 110px;
      }
    
      .main {
        margin-left: 0;
      }
    
      .top-bar {
        padding: 0 15px;
      }
    
      .top-bar-left h1 {
        font-size: 15px;
      }
    
      .top-bar-left p {
        display: none;
      }
    
      .hamburger {
        display: block;
      }
    
      .content-wrap {
        padding: 15px;
      }
    
      .modal {
        padding: 18px;
      }
    
      .modal-header h3 {
        font-size: 14px;
      }
    }
    
    @media (max-width: 480px) {
      .top-bar-left h1 {
        font-size: 14px;
      }
    
      .btn-view, .btn-download {
        padding: 5px 10px;
        font-size: 11px;
      }
    }
  </style>
</head>
<body>

  <!-- OVERLAY -->
  <div class="overlay" id="overlay" onclick="closeMobileSidebar()"></div>

  <!-- SIDEBAR -->
  <nav class="sidebar" id="sidebar">
    <img src="images/asiatech_logo.jpg" alt="ASIATECH Logo" class="sidebar-logo">
    <a href="faculty-dashboard.html"><i class="fas fa-home"></i><span class="sidebar-text">Dashboard</span></a>
    <a href="faculty-create-event.html"><i class="fas fa-plus-circle"></i><span class="sidebar-text">Create Event</span></a>
    <a href="faculty-my-events.html"><i class="fas fa-calendar-alt"></i><span class="sidebar-text">Manage Events</span></a>
    <a href="faculty-scan-qr.html"><i class="fas fa-qrcode"></i><span class="sidebar-text">Attendance Scanner</span></a>
    <a href="faculty-reports.html"><i class="fas fa-list-check"></i><span class="sidebar-text">Attendance Reports</span></a>
    <a href="faculty-profile.html"><i class="fas fa-user-circle"></i><span class="sidebar-text">Profile</span></a>
    <a href="faculty-settings.html"><i class="fas fa-cog"></i><span class="sidebar-text">Settings</span></a>
    <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i><span class="sidebar-text">Logout</span></a>
  </nav>

  <!-- MAIN -->
  <main class="main">

    <div class="top-bar">
      <div class="top-bar-left">
        <button class="hamburger" onclick="toggleMobileSidebar()">
          <i class="fas fa-bars"></i>
        </button>
        <div>
          <h1>Attendance Reports</h1>

        </div>
      </div>
    </div>

    <div class="content-wrap">
      <div class="card">
        <div class="card-head">
          <h2><i class="fas fa-list-check"></i> All Events</h2>
          <p id="event-count">Loading events...</p>
        </div>
        <div class="table-wrap" id="events-table-wrap">
          <p class="loading-text">
            <i class="fas fa-spinner fa-spin"></i> Loading events...
          </p>
        </div>
      </div>
    </div>
  </main>

  <!-- MODAL -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modalTitle"><i class="fas fa-users"></i> Attendance Records</h3>
        <button class="modal-close" onclick="closeModal()">
          <i class="fas fa-times"></i>
        </button>
      </div>
      <div class="modal-actions">
        <button class="btn-csv" onclick="downloadCSV()">
          <i class="fas fa-download"></i> Download CSV
        </button>
      </div>
      <div class="att-wrap">
        <div id="attendance-table-wrap">
          <p class="loading-text">Loading attendance records...</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    const user = JSON.parse(sessionStorage.getItem('user'));
    if (!user || user.role !== 'faculty') {
      window.location.href = 'loginpage.html';
    }

    const currentPage = window.location.pathname.split('/').pop();
    document.querySelectorAll('.sidebar a').forEach(link => {
      if (link.getAttribute('href') === currentPage) link.classList.add('active');
    });

    function logout() {
      if (confirm("Are you sure you want to logout?")) {
        sessionStorage.removeItem('user');
        window.location.href = 'loginpage.html';
      }
    }

    function toggleMobileSidebar() {
      document.getElementById('sidebar').classList.toggle('mobile-open');
      document.getElementById('overlay').classList.toggle('active');
    }
    function closeMobileSidebar() {
      document.getElementById('sidebar').classList.remove('mobile-open');
      document.getElementById('overlay').classList.remove('active');
    }

    const scriptURL = 'https://script.google.com/macros/s/AKfycbzYdDr94uC7aByOQG7l2DNXUuIVfUxmn5aHBdl5_ZHvCabQoz0wHNSAtTdnRPVwepRK4g/exec';
    let currentEventName = '';
    let currentAttendance = [];

    function formatDate(dateStr) {
      if (dateStr && dateStr.toString().includes('T')) {
        var date = new Date(dateStr);
        return date.toLocaleDateString('en-US', {
          year: 'numeric', month: 'long', day: 'numeric',
          hour: '2-digit', minute: '2-digit', timeZone: 'Asia/Manila'
        });
      }
      return dateStr;
    }

    async function loadEvents() {
      const wrap  = document.getElementById('events-table-wrap');
      const count = document.getElementById('event-count');
      try {
        const response = await fetch(scriptURL + "?action=getEvents", { method: "GET", redirect: "follow" });
        const events   = await response.json();

        if (events.length === 0) {
          wrap.innerHTML = "<p class='empty-text'>No events found.</p>";
          count.textContent = "0 events";
          return;
        }

        count.textContent = `${events.length} event(s) found`;

        let html = `
          <table class="events-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Event Name</th>
                <th>Date / Time</th>
                <th>Location</th>
                <th>Actions</th>
              </tr>
            </thead><tbody>`;

        events.forEach((event, index) => {
          html += `
            <tr>
              <td>${index + 1}</td>
              <td><strong>${event.name}</strong></td>
              <td>${formatDate(event.date)}</td>
              <td>${event.location || '--'}</td>
              <td>
                <button class="btn-view" onclick="viewAttendance('${event.name.replace(/'/g, "\\'")}')">
                  <i class="fas fa-eye"></i> View
                </button>
                <button class="btn-download" onclick="viewAttendance('${event.name.replace(/'/g, "\\'")}', true)">
                  <i class="fas fa-download"></i> Download
                </button>
              </td>
            </tr>`;
        });

        html += `</tbody></table>`;
        wrap.innerHTML = html;

      } catch (error) {
        wrap.innerHTML = "<p style='color:#dc2626; text-align:center; padding:20px;'>Failed to load events.</p>";
        count.textContent = "Error";
      }
    }

    async function viewAttendance(eventName, autoDownload = false) {
      currentEventName = eventName;
      document.getElementById('modalTitle').innerHTML = `<i class="fas fa-users"></i> ${eventName} - Attendance`;
      document.getElementById('attendance-table-wrap').innerHTML = "<p class='loading-text'><i class='fas fa-spinner fa-spin'></i> Loading...</p>";
      document.getElementById('modalOverlay').classList.add('active');

      try {
        const url      = `${scriptURL}?action=getAttendance&event=${encodeURIComponent(eventName)}`;
        const response = await fetch(url, { method: "GET", redirect: "follow" });
        const result   = await response.json();

        if (!result.success || result.data.length === 0) {
          document.getElementById('attendance-table-wrap').innerHTML = "<p class='empty-text'>No attendance records found.</p>";
          return;
        }

        currentAttendance = result.data;

        let html = `
          <table class="attendance-table">
            <thead>
              <tr>
                <th>#</th><th>Name</th><th>Student ID</th>
                <th>Course</th><th>Year</th><th>Section</th>
                <th>Status</th><th>Check-in</th><th>Check-out</th>
              </tr>
            </thead><tbody>`;

        result.data.forEach((row, i) => {
          const statusClass =
            row.status === 'PRESENT'         ? 'status-present'  :
            row.status === 'COMPLETED (OUT)'  ? 'status-complete' :
            'status-absent';
          html += `
            <tr>
              <td>${i + 1}</td>
              <td>${row.name}</td>
              <td>${row.studentId}</td>
              <td>${row.course}</td>
              <td>${row.yearLevel}</td>
              <td>${row.section}</td>
              <td class="${statusClass}">${row.status}</td>
              <td>${row.checkIn  || '--'}</td>
              <td>${row.checkOut || '--'}</td>
            </tr>`;
        });

        html += `</tbody></table>`;
        document.getElementById('attendance-table-wrap').innerHTML = html;
        if (autoDownload) downloadCSV();

      } catch (err) {
        document.getElementById('attendance-table-wrap').innerHTML = "<p style='color:#dc2626; text-align:center;'>Failed to load attendance.</p>";
      }
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('active');
      currentAttendance = [];
      currentEventName  = '';
    }

    function downloadCSV() {
      if (!currentAttendance.length) return;
      const headers = ['#', 'Name', 'Student ID', 'Course', 'Year Level', 'Section', 'Status', 'Check-in', 'Check-out'];
      const rows = currentAttendance.map((row, i) => [
        i + 1, row.name, row.studentId, row.course,
        row.yearLevel, row.section, row.status,
        row.checkIn || '', row.checkOut || ''
      ]);
      const csvContent = [headers, ...rows].map(r => r.map(val => `"${val}"`).join(',')).join('\n');
      const blob = new Blob([csvContent], { type: 'text/csv' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href     = url;
      a.download = `${currentEventName}_attendance.csv`;
      a.click();
      URL.revokeObjectURL(url);
    }

    document.getElementById('modalOverlay').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });

    window.onload = loadEvents;
  </script>

</body>
</html>

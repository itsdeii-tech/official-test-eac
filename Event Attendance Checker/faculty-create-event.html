<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Event - EAC</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: Arial, Helvetica, sans-serif;
      background-color: #f0f4f0;
      color: #333;
      min-height: 100vh;
    }
    
    /* SIDEBAR */
    .sidebar {
      width: 70px;
      background-color: #006400;
      padding: 20px 10px;
      height: 100vh;
      position: fixed;
      left: 0;
      top: 0;
      overflow: hidden;
      transition: width 0.3s ease, transform 0.3s ease;
      z-index: 1000;
    }
    
    .sidebar:hover {
      width: 230px;
    }
    
    .sidebar-text {
      display: none;
      white-space: nowrap;
    }
    
    .sidebar:hover .sidebar-text {
      display: inline;
    }
    
    .sidebar-logo {
      width: 50px;
      margin: 0 auto 20px;
      display: block;
      border-radius: 50%;
      transition: width 0.3s ease;
    }
    
    .sidebar:hover .sidebar-logo {
      width: 110px;
    }
    
    .sidebar a {
      display: flex;
      align-items: center;
      color: rgba(255, 255, 255, 0.85);
      text-decoration: none;
      padding: 11px 10px;
      margin-bottom: 4px;
      border-radius: 6px;
      transition: background 0.2s;
      font-size: 14px;
      position: relative;
    }
    
    .sidebar a:hover, .sidebar a.active {
      background-color: #228B22;
      color: white;
    }
    
    .sidebar i {
      min-width: 24px;
      font-size: 17px;
      text-align: center;
      margin-right: 0;
      transition: margin 0.3s ease;
    }
    
    .sidebar:hover i {
      margin-right: 12px;
    }
    
    .sidebar:not(:hover) a:hover {
      display: block;
    }
    
    /* OVERLAY */
    .overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 999;
    }
    
    .overlay.active {
      display: block;
    }
    
    /* HAMBURGER */
    .hamburger {
      display: none;
      background: none;
      border: none;
      color: white;
      font-size: 22px;
      cursor: pointer;
      padding: 5px;
    }
    
    /* MAIN */
    .main {
      margin-left: 70px;
      min-height: 100vh;
    }
    
    /* TOP BAR */
    .top-bar {
      background-color: #006400;
      color: white;
      padding: 0 28px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
    }
    
    .top-bar-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .top-bar-left h1 {
      font-size: 18px;
      font-weight: bold;
    }
    
    .top-bar-left p {
      font-size: 12px;
      opacity: 0.75;
      margin-top: 2px;
    }
    
    /* CONTENT */
    .content-wrap {
      padding: 24px 28px;
    }
    
    /* FORM CARD */
    .form-card {
      background: white;
      border: 1px solid #d4e8d4;
      border-radius: 10px;
      padding: 30px;
      max-width: 680px;
      margin: 0 auto;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.07);
    }
    
    .form-card h2 {
      color: #006400;
      margin-bottom: 25px;
      text-align: center;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    
    /* LABELS */
    label {
      display: block;
      margin: 15px 0 6px;
      font-size: 13px;
      font-weight: bold;
      color: #006400;
    }
    
    /* INPUTS */
    .input-wrapper {
      position: relative;
    }
    
    .input-wrapper i.input-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #aaa;
      font-size: 14px;
    }
    
    .input-wrapper input, .input-wrapper textarea {
      width: 100%;
      padding: 11px 14px 11px 36px;
      border: 1px solid #d4e8d4;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      transition: border 0.2s, box-shadow 0.2s;
      background: #fafff8;
    }
    
    .input-wrapper textarea {
      padding-top: 12px;
      resize: vertical;
    }
    
    .input-wrapper input:focus, .input-wrapper textarea:focus {
      outline: none;
      border-color: #228B22;
      box-shadow: 0 0 0 3px rgba(34, 139, 34, 0.1);
      background: white;
    }
    
    /* DATE + TIME ROW */
    .row {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }
    
    .row > div {
      flex: 1;
      min-width: 160px;
    }
    
    /* CREATE BTN */
    .create-btn {
      background: #228B22;
      color: white;
      padding: 13px;
      font-size: 15px;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      display: block;
      margin: 25px auto 0;
      width: 100%;
      font-family: inherit;
      transition: opacity 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    
    .create-btn:hover {
      opacity: 0.9;
    }
    
    .create-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    
    /* LINKS */
    .links-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 15px;
      flex-wrap: wrap;
      gap: 10px;
    }
    
    .links-row a {
      color: #006400;
      font-weight: bold;
      text-decoration: underline;
      font-size: 13px;
    }
    
    .links-row a:hover {
      color: #228B22;
    }
    
    /* NOTE */
    .note {
      text-align: center;
      color: #aaa;
      font-size: 12px;
      margin-top: 20px;
      padding-top: 15px;
      border-top: 1px solid #e8f0e8;
    }
    
    /* MOBILE RESPONSIVE */
    @media (max-width: 768px) {
      .sidebar {
        width: 230px;
        transform: translateX(-100%);
      }
    
      .sidebar:hover {
        width: 230px;
      }
    
      .sidebar.mobile-open {
        transform: translateX(0);
      }
    
      .sidebar.mobile-open .sidebar-text {
        display: inline;
      }
    
      .sidebar.mobile-open i {
        margin-right: 12px;
      }
    
      .sidebar.mobile-open .sidebar-logo {
        width: 110px;
      }
    
      .main {
        margin-left: 0;
      }
    
      .top-bar {
        padding: 0 15px;
      }
    
      .top-bar-left h1 {
        font-size: 15px;
      }
    
      .top-bar-left p {
        display: none;
      }
    
      .hamburger {
        display: block;
      }
    
      .content-wrap {
        padding: 15px;
      }
    
      .form-card {
        padding: 20px 16px;
      }
    
      .row {
        flex-direction: column;
        gap: 0;
      }
    }
    
    @media (max-width: 480px) {
      .top-bar-left h1 {
        font-size: 14px;
      }
    
      .form-card h2 {
        font-size: 17px;
      }
    }
  </style>
</head>
<body>

  <!-- OVERLAY -->
  <div class="overlay" id="overlay" onclick="closeMobileSidebar()"></div>

  <!-- SIDEBAR -->
  <nav class="sidebar" id="sidebar">
    <img src="images/asiatech_logo.jpg" alt="ASIATECH Logo" class="sidebar-logo">
    <a href="faculty-dashboard.html"><i class="fas fa-home"></i><span class="sidebar-text">Dashboard</span></a>
    <a href="faculty-create-event.html"><i class="fas fa-plus-circle"></i><span class="sidebar-text">Create Event</span></a>
    <a href="faculty-my-events.html"><i class="fas fa-calendar-alt"></i><span class="sidebar-text">Manage Events</span></a>
    <a href="faculty-scan-qr.html"><i class="fas fa-qrcode"></i><span class="sidebar-text">Attendance Scanner</span></a>
    <a href="faculty-reports.html"><i class="fas fa-list-check"></i><span class="sidebar-text">Attendance Reports</span></a>
    <a href="faculty-profile.html"><i class="fas fa-user-circle"></i><span class="sidebar-text">Profile</span></a>
    <a href="faculty-settings.html"><i class="fas fa-cog"></i><span class="sidebar-text">Settings</span></a>
    <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i><span class="sidebar-text">Logout</span></a>
  </nav>

  <!-- MAIN -->
  <main class="main">

    <div class="top-bar">
      <div class="top-bar-left">
        <button class="hamburger" onclick="toggleMobileSidebar()">
          <i class="fas fa-bars"></i>
        </button>
        <div>
          <h1>Create New Event</h1>
    
        </div>
      </div>
    </div>

    <div class="content-wrap">
      <div class="form-card">

        <!-- Event Title -->
        <label>Event Title</label>
        <div class="input-wrapper">
          <i class="fas fa-pen input-icon"></i>
          <input type="text" id="eventTitle" placeholder="e.g. Orientation Seminar" required>
        </div>

        <!-- Date + Time -->
        <div class="row">
          <div>
            <label>Date</label>
            <div class="input-wrapper">
              <i class="fas fa-calendar input-icon"></i>
              <input type="date" id="eventDate" required>
            </div>
          </div>
          <div>
            <label>Time</label>
            <div class="input-wrapper">
              <i class="fas fa-clock input-icon"></i>
              <input type="time" id="eventTime" required>
            </div>
          </div>
        </div>

        <!-- Venue -->
        <label>Venue / Location</label>
        <div class="input-wrapper">
          <i class="fas fa-location-dot input-icon"></i>
          <input type="text" id="eventVenue" placeholder="e.g. Main Hall">
        </div>

        <!-- Event Note -->
        <label>Event Note</label>
        <div class="input-wrapper">
          <i class="fas fa-note-sticky input-icon"></i>
          <textarea id="eventNote" rows="4"
            placeholder="e.g. Bring your student ID. Wear proper uniform."></textarea>
        </div>

        <!-- Create Button -->
        <button class="create-btn" onclick="createEventRealTime()">
          <i class="fas fa-plus"></i> Post Event
        </button>

        <!-- Links -->
        <div class="links-row">
          <a href="faculty-dashboard.html">Back to Dashboard</a>
          <a href="faculty-my-events.html">Go to My Events</a>
        </div>
      </div>
    </div>
  </main>

  <script>
    // Auth check
    const user = JSON.parse(sessionStorage.getItem('user'));
    if (!user || user.role !== 'faculty') {
      window.location.href = 'loginpage.html';
    }

    // Active sidebar
    const currentPage = window.location.pathname.split('/').pop();
    document.querySelectorAll('.sidebar a').forEach(link => {
      if (link.getAttribute('href') === currentPage) link.classList.add('active');
    });

    // Logout
    function logout() {
      if (confirm("Are you sure you want to logout?")) {
        sessionStorage.removeItem('user');
        window.location.href = 'loginpage.html';
      }
    }

    // Mobile sidebar
    function toggleMobileSidebar() {
      document.getElementById('sidebar').classList.toggle('mobile-open');
      document.getElementById('overlay').classList.toggle('active');
    }
    function closeMobileSidebar() {
      document.getElementById('sidebar').classList.remove('mobile-open');
      document.getElementById('overlay').classList.remove('active');
    }

    // Format date
    function formatEventDate(date, time) {
      const months = ["January","February","March","April","May","June",
                      "July","August","September","October","November","December"];
      const [year, month, day] = date.split("-");
      let [hour, minute] = time.split(":");
      hour = parseInt(hour);
      const ampm = hour >= 12 ? "PM" : "AM";
      hour = hour % 12 || 12;
      return `${months[parseInt(month)-1]} ${parseInt(day)}, ${year} ${hour}:${minute} ${ampm}`;
    }

    // Create event
    async function createEventRealTime() {
      const scriptURL = 'https://script.google.com/macros/s/AKfycbzYdDr94uC7aByOQG7l2DNXUuIVfUxmn5aHBdl5_ZHvCabQoz0wHNSAtTdnRPVwepRK4g/exec';
      

      const name     = document.getElementById('eventTitle').value.trim();
      const dateVal  = document.getElementById('eventDate').value;
      const timeVal  = document.getElementById('eventTime').value;
      const location = document.getElementById('eventVenue').value.trim();
      const notes    = document.getElementById('eventNote').value.trim();

      if (!name || !dateVal || !location) {
        alert("Event Title, Date, and Location are required!");
        return;
      }

      const date = formatEventDate(dateVal, timeVal);
      const btn  = document.querySelector('.create-btn');
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Syncing to Cloud...';
      btn.disabled  = true;

      try {
      const response = await fetch(scriptURL, {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: `data=${encodeURIComponent(JSON.stringify({
          action: "createEvent",
          name: name,
          date: date,
          location: location,
          notes: notes,
          faculty: user.email
        }))}`,
        redirect: "follow"
      });
      const result = await response.json();



       if (result.success) {
       alert(`Success! "${name}" is now live for all students.`);

        document.getElementById('eventTitle').value = "";
        document.getElementById('eventDate').value  = "";
        document.getElementById('eventTime').value  = "";
        document.getElementById('eventVenue').value = "";
        document.getElementById('eventNote').value  = "";

      } else {
        alert("Failed: " + JSON.stringify(result));
      }

      } catch (error) {
        alert('Cloud connection failed. Please try again.');
      } finally {
        btn.innerHTML = '<i class="fas fa-plus"></i> Create Event';
        btn.disabled  = false;
      }
    }
  </script>

</body>
</html>

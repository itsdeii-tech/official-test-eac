<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Event Attendance Checker</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #f0f4f0;
      min-height: 100vh;
      display: flex;
    }

    /* ── Left side ── */
    .left {
      width: 50%;
      background: #006400;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 40px;
      color: white;
      text-align: center;
    }

    .left img {
      width: 130px;
      margin-bottom: 24px;
    }

    .left h1 {
      font-size: 26px;
      font-weight: bold;
      margin-bottom: 10px;
      line-height: 1.3;
    }

    .left p {
      font-size: 14px;
      opacity: 0.8;
      line-height: 1.7;
      max-width: 280px;
    }

    .left-footer {
      position: absolute;
      bottom: 20px;
      left: 0;
      width: 50%;
      text-align: center;
      font-size: 11px;
      color: rgba(255,255,255,0.4);
    }

    /* ── Right side ── */
    .right {
      width: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    .form-box {
      width: 100%;
      max-width: 360px;
    }

    .form-box h2 {
      font-size: 22px;
      color: #1a1a1a;
      margin-bottom: 6px;
    }

    .form-box > p {
      font-size: 13px;
      color: #888;
      margin-bottom: 28px;
    }

    /* Role tabs */
    .role-tabs {
      display: flex;
      border: 1px solid #ccc;
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 24px;
    }

    .role-tabs input[type="radio"] { display: none; }

    .role-tabs label {
      flex: 1;
      text-align: center;
      padding: 10px;
      font-size: 14px;
      font-weight: bold;
      color: #888;
      cursor: pointer;
      background: white;
      transition: all 0.15s;
    }

    .role-tabs label:first-of-type {
      border-right: 1px solid #ccc;
    }

    .role-tabs input[type="radio"]:checked + label {
      background: #006400;
      color: white;
    }

    /* Fields */
    .field {
      margin-bottom: 16px;
    }

    .field label {
      display: block;
      font-size: 13px;
      font-weight: bold;
      color: #333;
      margin-bottom: 6px;
    }

    .field input {
      width: 100%;
      padding: 11px 13px;
      border: 1px solid #ccc;
      border-radius: 7px;
      font-size: 14px;
      color: #1a1a1a;
      background: white;
      font-family: inherit;
      transition: border 0.15s;
    }

    .field input:focus {
      outline: none;
      border-color: #006400;
    }

    .field input::placeholder { color: #bbb; }

    /* Forgot */
    .forgot {
      text-align: right;
      margin-bottom: 20px;
    }
    .forgot a {
      font-size: 12px;
      color: #006400;
      text-decoration: none;
    }
    .forgot a:hover { text-decoration: underline; }

    /* Error */
    .error-msg {
      display: none;
      font-size: 13px;
      color: #dc2626;
      background: #fff0f0;
      border: 1px solid #fca5a5;
      border-radius: 6px;
      padding: 9px 12px;
      margin-bottom: 14px;
    }
    .error-msg.show { display: block; }

    /* Button */
    .btn-login {
      width: 100%;
      padding: 13px;
      background: #006400;
      color: white;
      border: none;
      border-radius: 7px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }
    .btn-login:hover { background: #005200; }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }

    /* Register */
    .register {
      text-align: center;
      margin-top: 18px;
      font-size: 13px;
      color: #888;
    }
    .register a {
      color: #006400;
      font-weight: bold;
      text-decoration: none;
    }
    .register a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <!-- Left -->
  <div class="left">
    <img src="images/asiatech_logo.jpg" alt="ASIATECH Logo">
    <h1>Event Attendance Checker</h1>
    <p>Cloud-based QR Attendance System for CEITE · Asia Technological School</p>
  </div>
  <div class="left-footer">© 2026 ASIATECH · YOUR KEY TO GLOBAL SUCCESS!</div>

  <!-- Right -->
  <div class="right">
    <div class="form-box">

      <h2>Sign In</h2>
      <p>Enter your credentials to continue.</p>

      <!-- Role -->
      <div class="role-tabs">
        <input type="radio" id="role-faculty" name="role" value="faculty" checked>
        <label for="role-faculty">Faculty</label>
        <input type="radio" id="role-student" name="role" value="student">
        <label for="role-student">Student</label>
      </div>

      <!-- Error -->
      <div class="error-msg" id="errorMsg">Please fill in all fields.</div>

      <form onsubmit="handleLogin(event)">

        <div class="field">
          <label>Email</label>
          <input type="email" id="email" placeholder="yourname@asiatech.edu.ph" required>
        </div>

        <div class="field">
          <label>Password</label>
          <input type="password" id="password" placeholder="••••••••" required>
        </div>

        <div class="forgot">
          <a href="#">Forgot Password?</a>
        </div>

        <button type="submit" class="btn-login" id="loginBtn">Login</button>
      </form>

      <div class="register">
        No account yet? <a href="#">Register</a>
      </div>

    </div>
  </div>

  <script>
    function handleLogin(event) {
      event.preventDefault();

      const role     = document.querySelector('input[name="role"]:checked')?.value;
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const errorMsg = document.getElementById('errorMsg');
      const btn      = document.getElementById('loginBtn');

      if (!email || !password) {
        errorMsg.textContent = "Please fill in all fields.";
        errorMsg.classList.add('show');
        return;
      }

      errorMsg.classList.remove('show');
      btn.textContent = "Logging in...";
      btn.disabled = true;

      setTimeout(() => {
        if (role === 'faculty') {
          window.location.href = 'faculty-dashboard.html';
        } else {
          window.location.href = 'student-portal.html';
        }
      }, 1000);
    }
  </script>

</body>
</html>

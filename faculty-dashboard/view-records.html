<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>View / Download Reports - Faculty Attendance System</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: Arial, Helvetica, sans-serif; background-color: #f8f9fa; color: #333; min-height: 100vh; }

    /* SIDEBAR — default collapsed, hover to open */
    .sidebar {
      width: 70px;
      background-color: #006400;
      color: white;
      padding: 20px 10px;
      height: 100vh;
      position: fixed;
      left: 0; top: 0;
      overflow: hidden;
      transition: width 0.3s ease;
      z-index: 1000;
    }
    .sidebar:hover { width: 240px; }
    .sidebar-text { display: none; white-space: nowrap; }
    .sidebar:hover .sidebar-text { display: inline; }
    .sidebar-logo {
      width: 50px;
      margin: 0 auto 20px;
      display: block;
      border-radius: 50%;
      transition: width 0.3s ease;
    }
    .sidebar:hover .sidebar-logo { width: 120px; }
    
    .sidebar:hover .sidebar-title { display: block; }
    .sidebar a {
      display: flex;
      align-items: center;
      color: white;
      text-decoration: none;
      padding: 12px 10px;
      margin-bottom: 8px;
      border-radius: 6px;
      transition: background 0.2s;
    }
    .sidebar a:hover, .sidebar a.active { background-color: #228B22; }
    .sidebar i {
      min-width: 24px;
      font-size: 18px;
      text-align: center;
      margin-right: 0;
      transition: margin 0.3s ease;
    }
    .sidebar:hover i { margin-right: 12px; }

    /* MAIN */
    .main { margin-left: 70px; padding: 0; transition: margin-left 0.3s ease; }

    /* TOP BAR */
    .top-bar {
      background-color: #006400;
      color: white;
      padding: 20px;
      text-align: center;
      margin-bottom: 25px;
    }
    .top-bar h1 { font-size: 26px; margin: 0; }
    .top-bar p  { margin: 5px 0 0; font-size: 15px; opacity: 0.9; }

    /* CONTENT */
    .content-wrap { padding: 0 25px 25px; }

    .records-card {
      background: white;
      border: 1px solid #006400;
      border-radius: 8px;
      padding: 25px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 2px solid #228B22;
    }
    .card-header h2 {
      color: #006400;
      font-size: 20px;
    }
    .card-header p {
      color: #888;
      font-size: 13px;
    }

    /* TABLE */
    .events-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    .events-table thead tr { background: #006400; color: white; }
    .events-table th {
      padding: 12px 15px;
      text-align: left;
      font-weight: bold;
    }
    .events-table td {
      padding: 12px 15px;
      border-bottom: 1px solid #eee;
      vertical-align: middle;
    }
    .events-table tr:hover td { background: #f9f9f9; }
    .events-table tbody tr:last-child td { border-bottom: none; }

    /* BADGES */
    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
    }
    .badge-active  { background: #e8f5e9; color: #228B22; }
    .badge-past    { background: #f0f0f0; color: #888; }

    /* ACTION BUTTONS */
    .btn-view {
      background: #006400;
      color: white;
      padding: 7px 14px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-right: 6px;
    }
    .btn-view:hover { opacity: 0.85; }

    .btn-download {
      background: #228B22;
      color: white;
      padding: 7px 14px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-download:hover { opacity: 0.85; }

    /* ATTENDANCE MODAL */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 2000;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.active { display: flex; }

    .modal {
      background: white;
      border-radius: 10px;
      padding: 25px;
      width: 90%;
      max-width: 850px;
      max-height: 85vh;
      overflow-y: auto;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 2px solid #228B22;
    }
    .modal-header h3 { color: #006400; font-size: 18px; }
    .modal-close {
      background: none;
      border: none;
      font-size: 22px;
      cursor: pointer;
      color: #888;
    }
    .modal-close:hover { color: #dc2626; }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }
    .btn-csv {
      background: #228B22;
      color: white;
      padding: 8px 18px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
    }
    .btn-csv:hover { opacity: 0.85; }

    /* ATTENDANCE TABLE */
    .attendance-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .attendance-table thead tr { background: #006400; color: white; }
    .attendance-table th { padding: 10px 12px; text-align: left; }
    .attendance-table td { padding: 10px 12px; border-bottom: 1px solid #eee; }
    .attendance-table tr:hover td { background: #f9f9f9; }

    .status-present  { color: #228B22; font-weight: bold; }
    .status-absent   { color: #dc2626; font-weight: bold; }
    .status-complete { color: #006400; font-weight: bold; }

    .loading-text { text-align: center; color: #888; padding: 30px; font-size: 14px; }
    .empty-text   { text-align: center; color: #888; padding: 30px; font-size: 14px; }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <nav class="sidebar" id="sidebar">
    <img src="images/asiatech_logo.jpg" alt="ASIATECH Logo" class="sidebar-logo">
    <a href="faculty-dashboard.html"><i class="fas fa-home"></i> <span class="sidebar-text">Dashboard</span></a>
    <a href="create-event.html"><i class="fas fa-plus-circle"></i> <span class="sidebar-text">Post New Event</span></a>
    <a href="my-events.html"><i class="fas fa-calendar-alt"></i> <span class="sidebar-text">My Events</span></a>
    <a href="scan-qr.html"><i class="fas fa-qrcode"></i> <span class="sidebar-text">Scan QR Code</span></a>
    <a href="view-records.html"><i class="fas fa-list-check"></i> <span class="sidebar-text">View/Download Reports</span></a>
    <a href="faculty-profile.html"><i class="fas fa-user-circle"></i> <span class="sidebar-text">Profile</span></a>
    <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> <span class="sidebar-text">Logout</span></a>
  </nav>

  <!-- Main -->
  <main class="main" id="main">

    <div class="top-bar">
      <h1>View / Download Reports</h1>
      <p>Cloud-based Event Attendance Checker for CEITE</p>
    </div>

    <div class="content-wrap">
      <div class="records-card">

        <div class="card-header">
          <h2><i class="fas fa-list-check"></i> All Events</h2>
          <p id="event-count">Loading events...</p>
        </div>

        <div id="events-table-wrap">
          <p class="loading-text">
            <i class="fas fa-spinner fa-spin"></i> Fetching events from EAC_Database...
          </p>
        </div>

      </div>
    </div>
  </main>

  <!-- Attendance Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modalTitle"><i class="fas fa-users"></i> Attendance Records</h3>
        <button class="modal-close" onclick="closeModal()">
          <i class="fas fa-times"></i>
        </button>
      </div>

      <div class="modal-actions">
        <button class="btn-csv" onclick="downloadCSV()">
          <i class="fas fa-download"></i> Download CSV
        </button>
      </div>

      <div id="attendance-table-wrap">
        <p class="loading-text">Loading attendance records...</p>
      </div>
    </div>
  </div>

  <script>
    // Check login
    const user = JSON.parse(sessionStorage.getItem('user'));
    if (!user || user.role !== 'faculty') {
      window.location.href = 'loginpage.html';
    }

    // Active sidebar
    const currentPage = window.location.pathname.split('/').pop();
    document.querySelectorAll('.sidebar a').forEach(link => {
      if (link.getAttribute('href') === currentPage) {
        link.classList.add('active');
      }
    });

    // Logout
    function logout() {
      sessionStorage.removeItem('user');
      window.location.href = 'loginpage.html';
    }

    const scriptURL = 'https://script.google.com/macros/s/AKfycbyp7Y6S2g1ov_xXH8BONmBRe75lqrEDMRFaamUcyvbJTgZfD00vZB6x34o1co6gVOSt/exec';

    let currentEventName = '';
    let currentAttendance = [];

    // Format date
    function formatDate(dateStr) {
      if (dateStr && dateStr.toString().includes('T')) {
        var date = new Date(dateStr);
        return date.toLocaleDateString('en-US', {
          year: 'numeric', month: 'long', day: 'numeric',
          hour: '2-digit', minute: '2-digit',
          timeZone: 'Asia/Manila'
        });
      }
      return dateStr;
    }

    // Load events
    async function loadEvents() {
      const wrap = document.getElementById('events-table-wrap');
      const count = document.getElementById('event-count');

      try {
        const response = await fetch(scriptURL + "?action=getEvents", {
          method: "GET", redirect: "follow"
        });
        const events = await response.json();

        if (events.length === 0) {
          wrap.innerHTML = "<p class='empty-text'>No events found.</p>";
          count.textContent = "0 events";
          return;
        }

        count.textContent = `${events.length} event(s) found`;

        let html = `
          <table class="events-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Event Name</th>
                <th>Date / Time</th>
                <th>Location</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
        `;

        events.forEach((event, index) => {
          html += `
            <tr>
              <td>${index + 1}</td>
              <td><strong>${event.name}</strong></td>
              <td>${formatDate(event.date)}</td>
              <td>${event.location}</td>
              <td>
                <button class="btn-view" onclick="viewAttendance('${event.name.replace(/'/g, "\\'")}')">
                  <i class="fas fa-eye"></i> View
                </button>
                <button class="btn-download" onclick="viewAttendance('${event.name.replace(/'/g, "\\'")}', true)">
                  <i class="fas fa-download"></i> Download
                </button>
              </td>
            </tr>
          `;
        });

        html += `</tbody></table>`;
        wrap.innerHTML = html;

      } catch (error) {
        wrap.innerHTML = "<p style='color:red; text-align:center;'>Failed to load events.</p>";
        count.textContent = "Error loading";
      }
    }

    // View attendance
    async function viewAttendance(eventName, autoDownload = false) {
      currentEventName = eventName;
      document.getElementById('modalTitle').innerHTML =
        `<i class="fas fa-users"></i> ${eventName} — Attendance`;
      document.getElementById('attendance-table-wrap').innerHTML =
        "<p class='loading-text'><i class='fas fa-spinner fa-spin'></i> Loading...</p>";
      document.getElementById('modalOverlay').classList.add('active');

      try {
        const url = `${scriptURL}?action=getAttendance&event=${encodeURIComponent(eventName)}`;
        const response = await fetch(url, { method: "GET", redirect: "follow" });
        const result   = await response.json();

        if (!result.success || result.data.length === 0) {
          document.getElementById('attendance-table-wrap').innerHTML =
            "<p class='empty-text'>No attendance records found for this event.</p>";
          return;
        }

        currentAttendance = result.data;

        let html = `
          <table class="attendance-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Name</th>
                <th>Student ID</th>
                <th>Course</th>
                <th>Year</th>
                <th>Section</th>
                <th>Status</th>
                <th>Check-in</th>
                <th>Check-out</th>
              </tr>
            </thead>
            <tbody>
        `;

        result.data.forEach((row, i) => {
          const statusClass =
            row.status === 'PRESENT'        ? 'status-present'  :
            row.status === 'COMPLETED (OUT)'? 'status-complete'  :
            'status-absent';

          html += `
            <tr>
              <td>${i + 1}</td>
              <td>${row.name}</td>
              <td>${row.studentId}</td>
              <td>${row.course}</td>
              <td>${row.yearLevel}</td>
              <td>${row.section}</td>
              <td class="${statusClass}">${row.status}</td>
              <td>${row.checkIn  || '—'}</td>
              <td>${row.checkOut || '—'}</td>
            </tr>
          `;
        });

        html += `</tbody></table>`;
        document.getElementById('attendance-table-wrap').innerHTML = html;

        // Auto download if button clicked
        if (autoDownload) downloadCSV();

      } catch (err) {
        document.getElementById('attendance-table-wrap').innerHTML =
          "<p style='color:red; text-align:center;'>Failed to load attendance.</p>";
      }
    }

    // Close modal
    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('active');
      currentAttendance = [];
      currentEventName  = '';
    }

    // Download CSV
    function downloadCSV() {
      if (!currentAttendance.length) return;

      const headers = ['#', 'Name', 'Student ID', 'Course', 'Year Level', 'Section', 'Status', 'Check-in', 'Check-out'];
      const rows = currentAttendance.map((row, i) => [
        i + 1,
        row.name,
        row.studentId,
        row.course,
        row.yearLevel,
        row.section,
        row.status,
        row.checkIn  || '',
        row.checkOut || ''
      ]);

      const csvContent = [headers, ...rows]
        .map(r => r.map(val => `"${val}"`).join(','))
        .join('\n');

      const blob = new Blob([csvContent], { type: 'text/csv' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href     = url;
      a.download = `${currentEventName}_attendance.csv`;
      a.click();
      URL.revokeObjectURL(url);
    }

    // Close modal on overlay click
    document.getElementById('modalOverlay').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });

    window.onload = loadEvents;
  </script>

</body>
</html>
